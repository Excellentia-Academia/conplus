<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Excellentia Academia - Gestion des présences</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            color: #fff;
            position: relative;
        }

        /* Fond bleu-rouge avec image */
        .hero-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #002B5C 0%, #CE1126 50%, #002B5C 100%);
            z-index: -2;
        }

        .hero-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('IMG_1812.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            opacity: 0.3;
            mix-blend-mode: overlay;
        }

        .hero-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 100%);
        }

        /* Navigation */
        .nav-bar {
            background: rgba(10, 10, 26, 0.85);
            backdrop-filter: blur(12px);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #d4af37, #b8941e);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon i {
            font-size: 22px;
            color: #0a0a1a;
        }

        .logo-text {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #d4af37, #f5e6a3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .admin-btn, .logout-btn, .program-btn {
            padding: 10px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            border: none;
            font-size: 0.9rem;
        }

        .admin-btn {
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.5);
            color: #d4af37;
        }

        .admin-btn:hover {
            background: #d4af37;
            color: #0a0a1a;
            transform: translateY(-2px);
        }
        
        .program-btn {
            background: rgba(220, 38, 38, 0.85);
            border: 1px solid rgba(220, 38, 38, 1);
            color: white;
            box-shadow: 0 0 10px rgba(220, 38, 38, 0.5);
        }
        
        .program-btn:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220, 38, 38, 0.6);
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
            position: relative;
            z-index: 2;
        }

        /* Section Connexion */
        .login-section {
            max-width: 500px;
            margin: 80px auto;
            text-align: center;
        }

        .login-card {
            background: rgba(10, 10, 26, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 48px 40px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #d4af37, #b8941e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .login-icon i {
            font-size: 40px;
            color: #0a0a1a;
        }

        .login-card h2 {
            font-size: 1.8rem;
            margin-bottom: 12px;
            color: #d4af37;
        }

        .login-card p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 32px;
        }

        .code-input {
            width: 100%;
            padding: 16px 20px;
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 4px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: 16px;
            color: #fff;
            font-weight: 600;
            margin-bottom: 24px;
            transition: all 0.3s ease;
        }

        .code-input:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #d4af37, #b8941e);
            border: none;
            padding: 14px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            color: #0a0a1a;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }

        /* Espace Candidat */
        .candidate-section {
            display: none;
            animation: fadeInUp 0.6s ease;
        }

        .welcome-card {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(212, 175, 55, 0.05));
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 32px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .welcome-card h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            font-family: 'Cormorant Garamond', serif;
        }

        .welcome-card .greeting {
            color: #d4af37;
            font-size: 1.1rem;
        }

        /* Semaine en cours */
        .week-card {
            background: rgba(10, 10, 26, 0.75);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 32px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .week-header {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(212, 175, 55, 0.05));
            padding: 24px 28px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }

        .week-header h2 {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .week-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }

        .session-list {
            padding: 20px 28px;
        }

        .session-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .session-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(212, 175, 55, 0.2);
            transform: translateX(5px);
        }

        .session-info {
            flex: 1;
        }

        .session-date {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .session-day {
            font-size: 0.85rem;
            color: #d4af37;
        }

        .session-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-top: 8px;
        }

        .status-present {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .status-absent {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .response-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-present, .btn-absent {
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 0.9rem;
        }

        .btn-present {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid #10b981;
            color: #10b981;
        }

        .btn-present:hover, .btn-present.active {
            background: #10b981;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
        }

        .btn-absent {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid #ef4444;
            color: #ef4444;
        }

        .btn-absent:hover, .btn-absent.active {
            background: #ef4444;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.3);
        }

        /* Admin Dashboard */
        .admin-dashboard {
            display: none;
            animation: fadeInUp 0.6s ease;
        }

        .dashboard-title {
            font-size: 2rem;
            margin-bottom: 24px;
            font-family: 'Cormorant Garamond', serif;
            color: #d4af37;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(10, 10, 26, 0.75);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 28px;
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.2);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(212, 175, 55, 0.5);
        }

        .stat-icon {
            font-size: 2rem;
            color: #d4af37;
            margin-bottom: 12px;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #d4af37;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.6);
            margin-top: 8px;
        }

        .session-stats {
            background: rgba(10, 10, 26, 0.75);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .session-stats h3 {
            margin-bottom: 20px;
            color: #d4af37;
            font-size: 1.3rem;
        }

        .stat-detail {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .expand-btn {
            background: rgba(212, 175, 55, 0.2);
            border: none;
            color: #d4af37;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 16px;
            transition: all 0.3s ease;
        }

        .expand-btn:hover {
            background: rgba(212, 175, 55, 0.4);
        }

        .candidate-list {
            margin-top: 16px;
            display: none;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 16px;
        }

        .candidate-list.show {
            display: block;
            animation: fadeInUp 0.3s ease;
        }

        .candidate-item {
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
        }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #0f0f1a, #0a0a12);
            border-radius: 32px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(212, 175, 55, 0.3);
            animation: fadeInUp 0.4s ease;
        }

        .modal-content h2 {
            color: #d4af37;
            margin-bottom: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.8);
            font-weight: 500;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #d4af37;
        }
        
        .date-range {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .btn-danger {
            background: #dc2626;
            margin-top: 16px;
        }
        
        .btn-danger:hover {
            background: #b91c1c;
        }
        
        .week-program-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .delete-week-btn {
            background: rgba(220,38,38,0.2);
            border: 1px solid #dc2626;
            color: #dc2626;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .delete-week-btn:hover {
            background: #dc2626;
            color: white;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-bar { padding: 12px 16px; }
            .logo-text { font-size: 1rem; }
            .admin-btn, .logout-btn, .program-btn { padding: 8px 16px; font-size: 0.8rem; }
            .container { padding: 20px 16px; }
            .session-item { flex-direction: column; text-align: center; }
            .response-buttons { justify-content: center; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .welcome-card h1 { font-size: 1.5rem; }
        }
    </style>
</head>

    <!-- Modal Admin Login -->
    <div id="adminModal" class="modal">

            <h2><i class="fas fa-lock"></i> Accès Administrateur</h2>

            <button class="login-btn" onclick="checkAdminLogin()">Valider</button>
        </div>
    </div>
    
    <!-- Modal Programmation Formation -->

            <div id="programForm" style="display:none;">
                <div class="form-group">
                    <label>Semaine n°</label>
                    <input type="number" id="weekNumber" placeholder="Ex: 1, 2, 3..." min="1">
                </div>
                <div class="form-group">
                    <label>Dates de formation</label>
                    <div class="date-range">
                        <input type="date" id="date1" placeholder="Date 1">
                        <input type="date" id="date2" placeholder="Date 2">
                    </div>
                    <small style="color:#d4af37;">Format: Mercredi & Jeudi</small>

                <button class="login-btn" onclick="programFormation()">Valider la programmation</button>

            <div id="pinError" style="color:#ef4444; margin-top:12px; display:none;">Code PIN incorrect</div>

            "7M2D": "Joyce Aziza Azama", "3C8P": "Joyce Eke-Shombakapinga",
            "5L1S": "Junior Muteba Biayi", "9R7J": "Mersei Kanemeka Wa Nzambi",
            "2P4K": "Merveille Tshiala Mwana", "6H0Q": "Nicky Musadi Bitota",
            "1D8M": "Remi Kingambo", "8S5F": "Rodrick Banza",
            "4Q2L": "Rose Matunda", "7H3C": "Ruth Kalonga Ndaya",
            "9M6K": "Théovie Gabriel Ibambu", "3R0P": "Thomas Kashavu Muhigirwa",
            "5F8H": "Wilhelmine Safi Bagabo", "1A2A": "Ekip"
        };

        let currentCandidate = null;
        let isAdmin = false;
        let dynamicSessions = [];

        // Charger les sessions programmées depuis Firestore
        async function loadProgrammedSessions() {
            const snapshot = await db.collection("programmedWeeks").orderBy("weekNumber").get();
            dynamicSessions = [];
            snapshot.forEach(doc => {
                dynamicSessions.push(doc.data());
            });
            return dynamicSessions;
        }

        // Sauvegarder une semaine programmée
        async function saveProgrammedWeek(weekNumber, date1, date2) {
            await db.collection("programmedWeeks").doc(`week${weekNumber}`).set({
                weekNumber: weekNumber,
                date1: date1,
                date2: date2,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        // Supprimer une semaine programmée
        async function deleteProgrammedWeek(weekNumber) {
            await db.collection("programmedWeeks").doc(`week${weekNumber}`).delete();
            // Supprimer aussi les réponses associées à cette semaine
            const sessionsToDelete = [`week${weekNumber}_wed`, `week${weekNumber}_thu`];
            for (const sessionId of sessionsToDelete) {
                const responsesSnapshot = await db.collection("responses").where("sessionId", "==", sessionId).get();
                responsesSnapshot.forEach(async (doc) => {
                    await doc.ref.delete();
                });
            }
            await loadProgrammedSessions();
            if (isAdmin) {
                loadAdminDashboard();
                displayProgrammedWeeks();
            }
            if (currentCandidate && !isAdmin) loadCandidateSessions();
        }

        // Générer les séances à partir des semaines programmées + semaines par défaut
        async function getAllSessions() {
            await loadProgrammedSessions();
            const sessions = [];
            for (const week of dynamicSessions) {
                sessions.push({
                    id: `week${week.weekNumber}_wed`,
                    week: week.weekNumber,
                    date: week.date1,
                    day: "Mercredi",
                    displayDate: new Date(week.date1).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' })
                });
                sessions.push({
                    id: `week${week.weekNumber}_thu`,
                    week: week.weekNumber,
                    date: week.date2,
                    day: "Jeudi",
                    displayDate: new Date(week.date2).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' })
                });
            }
            return sessions;
        }

        // Obtenir la semaine en cours (basée sur la date actuelle)
        function getCurrentWeekFromSessions(sessions) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            for (const session of sessions) {
                const sessionDate = new Date(session.date);
                if (sessionDate >= today) {
                    return session.week;
                }
            }
            return sessions.length > 0 ? sessions[0].week : null;
        }

        // Obtenir les sessions de la semaine en cours
        async function getCurrentWeekSessions() {
            const allSessions = await getAllSessions();
            if (allSessions.length === 0) return [];
            const currentWeek = getCurrentWeekFromSessions(allSessions);
            return allSessions.filter(s => s.week === currentWeek);
        }

        // Connexion candidat
        async function loginCandidate() {
            const code = document.getElementById('candidateCode').value.toUpperCase().trim();
            if (candidates[code]) {
                currentCandidate = { code, name: candidates[code] };
                localStorage.setItem('candidateCode', code);
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('candidateSection').style.display = 'block';
                document.getElementById('logoutBtn').style.display = 'inline-block';
                document.getElementById('welcomeName').innerHTML = candidates[code];
                document.getElementById('greetingMessage').innerHTML = getGreeting(candidates[code]);
                gsap.fromTo(".welcome-card", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.6 });
                loadCandidateSessions();
            } else {
                alert("Code invalide. Veuillez réessayer.");
            }
        }

        function getGreeting(name) {
            const hour = new Date().getHours();
            const greeting = hour < 12 ? "Bonjour" : (hour < 18 ? "Bon après-midi" : "Bonsoir");
            return `${greeting} ${name}`;
        }

        async function loadCandidateSessions() {
            const sessions = await getCurrentWeekSessions();
            const container = document.getElementById('currentWeekContainer');
            if (sessions.length === 0) {
                container.innerHTML = '<div class="week-card"><div class="week-header"><h2>🎉 Aucune formation programmée</h2><p>Revenez plus tard pour les prochaines dates.</p></div></div>';
                return;
            }
            let html = `<div class="week-card"><div class="week-header"><h2>📅 Semaine ${sessions[0].week}</h2><p>Merci de confirmer votre présence pour chaque séance</p></div><div class="session-list">`;
            for (const session of sessions) {
                const docRef = db.collection("responses").doc(`${currentCandidate.code}_${session.id}`);
                const doc = await docRef.get();
                const response = doc.exists ? doc.data().status : null;
                html += `<div class="session-item"><div class="session-info"><div class="session-date">${session.day} ${session.displayDate}</div><div class="session-status ${response === 'present' ? 'status-present' : (response === 'absent' ? 'status-absent' : 'status-pending')}">${response === 'present' ? '✓ Présent' : (response === 'absent' ? '✗ Absent' : '⏳ En attente de réponse')}</div></div><div class="response-buttons"><button class="btn-present ${response === 'present' ? 'active' : ''}" onclick="setResponse('${session.id}', 'present')"><i class="fas fa-check"></i> Je serai présent</button><button class="btn-absent ${response === 'absent' ? 'active' : ''}" onclick="setResponse('${session.id}', 'absent')"><i class="fas fa-times"></i> Je serai absent</button></div></div>`;
            }
            html += `</div></div>`;
            container.innerHTML = html;
            gsap.fromTo(".session-item", { opacity: 0, x: -20 }, { opacity: 1, x: 0, duration: 0.4, stagger: 0.1 });
        }

        async function setResponse(sessionId, status) {
            if (!currentCandidate) return;
            await db.collection("responses").doc(`${currentCandidate.code}_${sessionId}`).set({
                candidateCode: currentCandidate.code,
                candidateName: currentCandidate.name,
                sessionId: sessionId,
                status: status,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            loadCandidateSessions();
            if (isAdmin) loadAdminDashboard();
        }

        // Admin functions
        function showAdminLogin() {
            document.getElementById('adminModal').style.display = 'flex';
            gsap.fromTo(".modal-content", { scale: 0.9, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.3 });
        }

        function checkAdminLogin() {
            const password = document.getElementById('adminPassword').value;
            if (password === "Ekipelo") {
                isAdmin = true;
                document.getElementById('adminModal').style.display = 'none';
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('candidateSection').style.display = 'none';
                document.getElementById('adminDashboard').style.display = 'block';
                document.getElementById('logoutBtn').style.display = 'inline-block';
                document.getElementById('programBtn').style.display = 'inline-block';
                loadAdminDashboard();
                displayProgrammedWeeks();
            } else {
                alert("Mot de passe incorrect");
            }
        }

        async function loadAdminDashboard() {
            const totalCandidates = Object.keys(candidates).length;
            document.getElementById('totalCandidates').innerText = totalCandidates;
            const sessions = await getCurrentWeekSessions();
            const container = document.getElementById('adminSessionsContainer');
            if (sessions.length === 0) {
                container.innerHTML = '<div class="session-stats"><h3>Aucune session en cours</h3></div>';
                return;
            }
            let html = '';
            for (const session of sessions) {
                const responsesSnapshot = await db.collection("responses").where("sessionId", "==", session.id).get();
                const responses = {};
                responsesSnapshot.forEach(doc => { responses[doc.data().candidateCode] = doc.data().status; });
                let present = 0, absent = 0, noResponse = 0;
                for (const code in candidates) {
                    if (responses[code] === 'present') present++;
                    else if (responses[code] === 'absent') absent++;
                    else noResponse++;
                }
                html += `<div class="session-stats" id="session-${session.id}"><h3><i class="fas fa-calendar-alt"></i> ${session.day} ${session.displayDate}</h3><div class="stat-detail"><strong>👥 Total :</strong> ${totalCandidates}</div><div class="stat-detail" style="color:#10b981"><strong>✓ Présents :</strong> ${present}</div><div class="stat-detail" style="color:#ef4444"><strong>✗ Absents :</strong> ${absent}</div><div class="stat-detail" style="color:#f59e0b"><strong>⏳ Sans réponse :</strong> ${noResponse}</div><button class="expand-btn" onclick="toggleCandidateList('${session.id}')"><i class="fas fa-users"></i> Voir les détails</button><div id="list-${session.id}" class="candidate-list"></div></div>`;
            }
            container.innerHTML = html;
        }

        async function toggleCandidateList(sessionId) {
            const listDiv = document.getElementById(`list-${sessionId}`);
            if (listDiv.classList.contains('show')) {
                listDiv.classList.remove('show');
                return;
            }
            const responsesSnapshot = await db.collection("responses").where("sessionId", "==", sessionId).get();
            const responses = {};
            responsesSnapshot.forEach(doc => { responses[doc.data().candidateCode] = doc.data().status; });
            let presentList = [], absentList = [], noResponseList = [];
            for (const [code, name] of Object.entries(candidates)) {
                const status = responses[code];
                if (status === 'present') presentList.push(name);
                else if (status === 'absent') absentList.push(name);
                else noResponseList.push(name);
            }
            listDiv.innerHTML = `<div style="margin-bottom:12px;"><strong style="color:#10b981">✓ Présents (${presentList.length}) :</strong><br>${presentList.map(n => `<div class="candidate-item">• ${n}</div>`).join('') || '<div class="candidate-item">Aucun</div>'}</div><div style="margin-bottom:12px;"><strong style="color:#ef4444">✗ Absents (${absentList.length}) :</strong><br>${absentList.map(n => `<div class="candidate-item">• ${n}</div>`).join('') || '<div class="candidate-item">Aucun</div>'}</div><div><strong style="color:#f59e0b">⏳ Sans réponse (${noResponseList.length}) :</strong><br>${noResponseList.map(n => `<div class="candidate-item">• ${n}</div>`).join('') || '<div class="candidate-item">Aucun</div>'}</div>`;
            listDiv.classList.add('show');
        }

        function showProgramModal() {
            document.getElementById('programModal').style.display = 'flex';
            document.getElementById('programForm').style.display = 'none';
            document.getElementById('pinError').style.display = 'none';
            document.getElementById('pinCode').value = '';
            document.getElementById('pinCode').focus();
        }

        function verifyPinAndShowForm() {
            const pin = document.getElementById('pinCode').value;
            if (pin === "0022") {
                document.getElementById('programForm').style.display = 'block';
                document.getElementById('pinError').style.display = 'none';
            } else {
                document.getElementById('pinError').style.display = 'block';
                document.getElementById('programForm').style.display = 'none';
            }
        }

        document.getElementById('pinCode')?.addEventListener('input', verifyPinAndShowForm);

        async function programFormation() {
            const weekNumber = parseInt(document.getElementById('weekNumber').value);
            const date1 = document.getElementById('date1').value;
            const date2 = document.getElementById('date2').value;
            if (!weekNumber || !date1 || !date2) {
                alert("Veuillez remplir tous les champs");
                return;
            }
            const existingWeeks = await loadProgrammedSessions();
            if (existingWeeks.some(w => w.weekNumber === weekNumber)) {
                alert(`La semaine ${weekNumber} est déjà programmée. Supprimez-la d'abord si vous voulez la modifier.`);
                return;
            }
            await saveProgrammedWeek(weekNumber, date1, date2);
            document.getElementById('programModal').style.display = 'none';
            await loadProgrammedSessions();
            displayProgrammedWeeks();
            if (isAdmin) loadAdminDashboard();
            alert(`Formation de la semaine ${weekNumber} programmée avec succès !`);
        }

        async function displayProgrammedWeeks() {
            const weeks = await loadProgrammedSessions();
            const container = document.getElementById('programmedWeeksContainer');
            if (weeks.length === 0) {
                container.innerHTML = '<div class="session-stats"><h3>Aucune formation programmée</h3><p>Utilisez le bouton rouge pour programmer les dates.</p></div>';
                return;
            }
            let html = '<div class="session-stats"><h3><i class="fas fa-calendar-check"></i> Formations programmées</h3>';
            for (const week of weeks.sort((a,b) => a.weekNumber - b.weekNumber)) {
                html += `<div class="week-program-item">
                    <div><strong>Semaine ${week.weekNumber}</strong><br>
                    <span style="font-size:0.85rem;">Mercredi: ${new Date(week.date1).toLocaleDateString('fr-FR')}<br>
                    Jeudi: ${new Date(week.date2).toLocaleDateString('fr-FR')}</span></div>
                    <button class="delete-week-btn" onclick="deleteProgrammedWeek(${week.weekNumber})"><i class="fas fa-trash"></i> Supprimer</button>
                </div>`;
            }
            html += '</div>';
            container.innerHTML = html;
        }

        function logout() {
            localStorage.removeItem('candidateCode');
            currentCandidate = null;
            isAdmin = false;
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('candidateSection').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'none';
            document.getElementById('programBtn').style.display = 'none';
            document.getElementById('candidateCode').value = '';
            gsap.fromTo(".login-card", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.6 });
        }

        async function checkSavedLogin() {
            const savedCode = localStorage.getItem('candidateCode');
            if (savedCode && candidates[savedCode]) {
                currentCandidate = { code: savedCode, name: candidates[savedCode] };
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('candidateSection').style.display = 'block';
                document.getElementById('logoutBtn').style.display = 'inline-block';
                document.getElementById('welcomeName').innerHTML = candidates[savedCode];
                document.getElementById('greetingMessage').innerHTML = getGreeting(candidates[savedCode]);
                await loadCandidateSessions();
            }
        }

        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        }

        checkSavedLogin();
        gsap.fromTo(".login-card", { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.8, delay: 0.2 });
        setInterval(async () => {
            if (currentCandidate && !isAdmin) await loadCandidateSessions();
            if (isAdmin) { await loadAdminDashboard(); await displayProgrammedWeeks(); }
        }, 60000);
    </script>
