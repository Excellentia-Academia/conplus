<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Excellentia Academia - Gestion des présences</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            color: #fff;
            position: relative;
        }

        /* Fond bleu-rouge avec image */
        .hero-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #002B5C 0%, #CE1126 50%, #002B5C 100%);
            z-index: -2;
        }

        .hero-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('IMG_1812.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            opacity: 0.3;
            mix-blend-mode: overlay;
        }

        .hero-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 100%);
        }

        /* Navigation */
        .nav-bar {
            background: rgba(10, 10, 26, 0.85);
            backdrop-filter: blur(12px);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #d4af37, #b8941e);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon i {
            font-size: 22px;
            color: #0a0a1a;
        }

        .logo-text {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #d4af37, #f5e6a3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .admin-btn, .logout-btn, .program-btn {
            padding: 10px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            border: none;
            font-size: 0.9rem;
        }

        .admin-btn {
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.5);
            color: #d4af37;
        }

        .admin-btn:hover {
            background: #d4af37;
            color: #0a0a1a;
            transform: translateY(-2px);
        }
        
        .program-btn {
            background: rgba(220, 38, 38, 0.85);
            border: 1px solid rgba(220, 38, 38, 1);
            color: white;
            box-shadow: 0 0 10px rgba(220, 38, 38, 0.5);
        }
        
        .program-btn:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220, 38, 38, 0.6);
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
            position: relative;
            z-index: 2;
        }

        /* Section Connexion */
        .login-section {
            max-width: 500px;
            margin: 80px auto;
            text-align: center;
        }

        .login-card {
            background: rgba(10, 10, 26, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 48px 40px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #d4af37, #b8941e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .login-icon i {
            font-size: 40px;
            color: #0a0a1a;
        }

        .login-card h2 {
            font-size: 1.8rem;
            margin-bottom: 12px;
            color: #d4af37;
        }

        .login-card p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 32px;
        }

        .code-input {
            width: 100%;
            padding: 16px 20px;
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 4px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: 16px;
            color: #fff;
            font-weight: 600;
            margin-bottom: 24px;
            transition: all 0.3s ease;
        }

        .code-input:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #d4af37, #b8941e);
            border: none;
            padding: 14px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            color: #0a0a1a;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }

        /* Espace Candidat */
        .candidate-section {
            display: none;
            animation: fadeInUp 0.6s ease;
        }

        .welcome-card {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(212, 175, 55, 0.05));
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 32px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .welcome-card h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            font-family: 'Cormorant Garamond', serif;
        }

        .welcome-card .greeting {
            color: #d4af37;
            font-size: 1.1rem;
        }

        /* Semaine en cours */
        .week-card {
            background: rgba(10, 10, 26, 0.75);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 32px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .week-header {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(212, 175, 55, 0.05));
            padding: 24px 28px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }

        .week-header h2 {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .week-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }

        .session-list {
            padding: 20px 28px;
        }

        .session-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .session-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(212, 175, 55, 0.2);
            transform: translateX(5px);
        }

        .session-info {
            flex: 1;
        }

        .session-date {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .session-day {
            font-size: 0.85rem;
            color: #d4af37;
        }

        .session-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-top: 8px;
        }

        .status-present {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .status-absent {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .response-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-present, .btn-absent {
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 0.9rem;
        }

        .btn-present {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid #10b981;
            color: #10b981;
        }

        .btn-present:hover, .btn-present.active {
            background: #10b981;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
        }

        .btn-absent {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid #ef4444;
            color: #ef4444;
        }

        .btn-absent:hover, .btn-absent.active {
            background: #ef4444;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.3);
        }

        /* Admin Dashboard */
        .admin-dashboard {
            display: none;
            animation: fadeInUp 0.6s ease;
        }

        .dashboard-title {
            font-size: 2rem;
            margin-bottom: 24px;
            font-family: 'Cormorant Garamond', serif;
            color: #d4af37;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(10, 10, 26, 0.75);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 28px;
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.2);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(212, 175, 55, 0.5);
        }

        .stat-icon {
            font-size: 2rem;
            color: #d4af37;
            margin-bottom: 12px;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #d4af37;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.6);
            margin-top: 8px;
        }

        .session-stats {
            background: rgba(10, 10, 26, 0.75);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .session-stats h3 {
            margin-bottom: 20px;
            color: #d4af37;
            font-size: 1.3rem;
        }

        .stat-detail {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .expand-btn {
            background: rgba(212, 175, 55, 0.2);
            border: none;
            color: #d4af37;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 16px;
            transition: all 0.3s ease;
        }

        .expand-btn:hover {
            background: rgba(212, 175, 55, 0.4);
        }

        .candidate-list {
            margin-top: 16px;
            display: none;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 16px;
        }

        .candidate-list.show {
            display: block;
            animation: fadeInUp 0.3s ease;
        }

        .candidate-item {
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
        }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #0f0f1a, #0a0a12);
            border-radius: 32px;
            padding: 40px;
            max-width: 550px;
            width: 90%;
            border: 1px solid rgba(212, 175, 55, 0.3);
            animation: fadeInUp 0.4s ease;
        }

        .modal-content h2 {
            color: #d4af37;
            margin-bottom: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.8);
            font-weight: 500;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #d4af37;
        }
        
        .dynamic-days-container {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 16px;
            margin-top: 8px;
        }
        
        .day-slot {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .day-slot select, .day-slot input {
            flex: 1;
            min-width: 120px;
        }
        
        .remove-day {
            background: rgba(239, 68, 68, 0.2);
            border: none;
            color: #ef4444;
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .add-day-btn {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid #10b981;
            color: #10b981;
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 8px;
            width: 100%;
        }
        
        .btn-danger {
            background: #dc2626;
            margin-top: 16px;
        }
        
        .btn-danger:hover {
            background: #b91c1c;
        }
        
        .week-program-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .delete-week-btn {
            background: rgba(220,38,38,0.2);
            border: 1px solid #dc2626;
            color: #dc2626;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .delete-week-btn:hover {
            background: #dc2626;
            color: white;
        }
        
        .sessions-preview {
            font-size: 0.85rem;
            margin-top: 8px;
            color: #d4af37;
        }

        @media (max-width: 768px) {
            .nav-bar { padding: 12px 16px; }
            .logo-text { font-size: 1rem; }
            .admin-btn, .logout-btn, .program-btn { padding: 8px 16px; font-size: 0.8rem; }
            .container { padding: 20px 16px; }
            .session-item { flex-direction: column; text-align: center; }
            .response-buttons { justify-content: center; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .welcome-card h1 { font-size: 1.5rem; }
            .day-slot { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <div class="hero-bg"></div>

    <div class="nav-bar">
        <div class="logo">
            <div class="logo-icon">
                <i class="fas fa-microphone-alt"></i>
            </div>
            <div class="logo-text">Excellentia Academia</div>
        </div>
        <div class="nav-buttons">
            <button class="admin-btn" onclick="showAdminLogin()">
                <i class="fas fa-chart-line"></i> Administration
            </button>
            <button class="program-btn" id="programBtn" onclick="showProgramModal()" style="display:none">
                <i class="fas fa-calendar-plus"></i> Programmer Formation
            </button>
            <button class="logout-btn" onclick="logout()" style="display:none" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> Déconnexion
            </button>
        </div>
    </div>

    <div class="container">
        <!-- Section Connexion -->
        <div id="loginSection" class="login-section">
            <div class="login-card">
                <div class="login-icon">
                    <i class="fas fa-id-card"></i>
                </div>
                <h2>Espace Candidat</h2>
                <p>Entrez votre code unique pour accéder à votre espace personnel</p>
                <input type="text" id="candidateCode" class="code-input" placeholder="Ex: 7K2M" maxlength="4" autocomplete="off">
                <button class="login-btn" onclick="loginCandidate()">
                    <i class="fas fa-arrow-right"></i> Se connecter
                </button>
            </div>
        </div>

        <!-- Espace Candidat -->
        <div id="candidateSection" class="candidate-section">
            <div class="welcome-card">
                <h1 id="welcomeName"></h1>
                <div class="greeting" id="greetingMessage"></div>
            </div>
            <div id="currentWeekContainer"></div>
        </div>

        <!-- Admin Dashboard -->
        <div id="adminDashboard" class="admin-dashboard">
            <h2 class="dashboard-title"><i class="fas fa-chart-line"></i> Tableau de bord</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-users"></i></div>
                    <div class="stat-number" id="totalCandidates">0</div>
                    <div class="stat-label">Total candidats</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-number" id="totalPresent">0</div>
                    <div class="stat-label">Total présents</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-times-circle"></i></div>
                    <div class="stat-number" id="totalAbsent">0</div>
                    <div class="stat-label">Total absents</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-clock"></i></div>
                    <div class="stat-number" id="totalNoResponse">0</div>
                    <div class="stat-label">Sans réponse</div>
                </div>
            </div>
            <div id="adminSessionsContainer"></div>
            <div id="programmedWeeksContainer" style="margin-top: 30px;"></div>
        </div>
    </div>

    <!-- Modal Admin Login -->
    <div id="adminModal" class="modal">
        <div class="modal-content">
            <h2><i class="fas fa-lock"></i> Accès Administrateur</h2>
            <input type="password" id="adminPassword" class="code-input" placeholder="Mot de passe">
            <button class="login-btn" onclick="checkAdminLogin()">Valider</button>
        </div>
    </div>
    
    <!-- Modal Programmation Formation -->
    <div id="programModal" class="modal">
        <div class="modal-content">
            <h2><i class="fas fa-calendar-alt"></i> Programmer une formation</h2>
            <input type="password" id="pinCode" class="code-input" placeholder="Code PIN (0022)" maxlength="4">
            <div id="programForm" style="display:none;">
                <div class="form-group">
                    <label>Semaine n°</label>
                    <input type="number" id="weekNumber" placeholder="Ex: 1, 2, 3..." min="1">
                </div>
                <div class="form-group">
                    <label>Jours de formation (choisissez les jours souhaités)</label>
                    <div id="dynamicDaysContainer" class="dynamic-days-container">
                        <div class="day-slot" data-index="0">
                            <select class="day-select">
                                <option value="Lundi">Lundi</option>
                                <option value="Mardi">Mardi</option>
                                <option value="Mercredi">Mercredi</option>
                                <option value="Jeudi">Jeudi</option>
                                <option value="Vendredi">Vendredi</option>
                                <option value="Samedi">Samedi</option>
                            </select>
                            <input type="date" class="date-picker" placeholder="Date">
                            <button type="button" class="remove-day" onclick="removeDaySlot(this)" style="display:none;">🗑️</button>
                        </div>
                    </div>
                    <button type="button" class="add-day-btn" onclick="addDaySlot()"><i class="fas fa-plus"></i> Ajouter un jour</button>
                    <div class="sessions-preview" id="sessionsPreview"></div>
                </div>
                <button class="login-btn" onclick="programFormation()">Valider la programmation</button>
            </div>
            <div id="pinError" style="color:#ef4444; margin-top:12px; display:none;">Code PIN incorrect (le code requis est 0022)</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCOSnZ0ogR05svM0SbALqSlNqmODDDlIyw",
            authDomain: "conf-94615.firebaseapp.com",
            projectId: "conf-94615",
            storageBucket: "conf-94615.firebasestorage.app",
            messagingSenderId: "312554343685",
            appId: "1:312554343685:web:b199e33ff4ca050d533b6c",
            measurementId: "G-BLCPS9S0ZJ"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const candidates = {

        let currentCandidate = null, isAdmin = false, hasPinAccess = false;
        let dynamicSessions = [];

        async function loadProgrammedSessions() {
            const snapshot = await db.collection("programmedWeeks").orderBy("weekNumber").get();
            dynamicSessions = [];
            snapshot.forEach(doc => dynamicSessions.push(doc.data()));
            return dynamicSessions;
        }

        async function saveProgrammedWeek(weekNumber, sessionsData) {
            await db.collection("programmedWeeks").doc(`week${weekNumber}`).set({
                weekNumber: weekNumber,
                sessions: sessionsData,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        async function deleteProgrammedWeek(weekNumber) {
            if (!hasPinAccess) { alert("Accès refusé: vous devez saisir le code PIN 0022 pour supprimer."); return; }
            await db.collection("programmedWeeks").doc(`week${weekNumber}`).delete();
            const allSessionIds = dynamicSessions.find(w => w.weekNumber === weekNumber)?.sessions.map(s => `${weekNumber}_${s.day}_${s.date}`) || [];
            for (const sessionId of allSessionIds) {
                const responsesSnapshot = await db.collection("responses").where("sessionId", "==", sessionId).get();
                responsesSnapshot.forEach(async (doc) => await doc.ref.delete());
            }
            await loadProgrammedSessions();
            if (isAdmin) { loadAdminDashboard(); displayProgrammedWeeks(); }
            if (currentCandidate && !isAdmin) loadCandidateSessions();
        }

        async function getAllSessions() {
            await loadProgrammedSessions();
            const sessions = [];
            for (const week of dynamicSessions) {
                for (const sess of week.sessions) {
                    sessions.push({
                        id: `${week.weekNumber}_${sess.day}_${sess.date}`,
                        week: week.weekNumber,
                        date: sess.date,
                        day: sess.day,
                        displayDate: new Date(sess.date).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' })
                    });
                }
            }
            return sessions;
        }

        function getCurrentWeekFromSessions(sessions) {
            const today = new Date(); today.setHours(0,0,0,0);
            for (const s of sessions) if (new Date(s.date) >= today) return s.week;
            return sessions.length ? sessions[0].week : null;
        }

        async function getCurrentWeekSessions() {
            const all = await getAllSessions();
            if (!all.length) return [];
            const currentWeek = getCurrentWeekFromSessions(all);
            return all.filter(s => s.week === currentWeek);
        }

        async function loginCandidate() {
            const code = document.getElementById('candidateCode').value.toUpperCase().trim();
            if (candidates[code]) {
                currentCandidate = { code, name: candidates[code] };
                localStorage.setItem('candidateCode', code);
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('candidateSection').style.display = 'block';
                document.getElementById('logoutBtn').style.display = 'inline-block';
                document.getElementById('welcomeName').innerHTML = candidates[code];
                document.getElementById('greetingMessage').innerHTML = `Bonjour ${candidates[code]}`;
                loadCandidateSessions();
            } else alert("Code invalide.");
        }

        async function loadCandidateSessions() {
            const sessions = await getCurrentWeekSessions();
            const container = document.getElementById('currentWeekContainer');
            if (!sessions.length) { container.innerHTML = '<div class="week-card"><div class="week-header"><h2>📅 Aucune formation programmée</h2></div></div>'; return; }
            let html = `<div class="week-card"><div class="week-header"><h2>Semaine ${sessions[0].week}</h2><p>Confirmez votre présence</p></div><div class="session-list">`;
            for (const s of sessions) {
                const docRef = db.collection("responses").doc(`${currentCandidate.code}_${s.id}`);
                const doc = await docRef.get();
                const status = doc.exists ? doc.data().status : null;
                html += `<div class="session-item"><div class="session-info"><div class="session-date">${s.day} ${s.displayDate}</div><div class="session-status ${status === 'present' ? 'status-present' : (status === 'absent' ? 'status-absent' : 'status-pending')}">${status === 'present' ? '✓ Présent' : (status === 'absent' ? '✗ Absent' : '⏳ En attente')}</div></div><div class="response-buttons"><button class="btn-present ${status === 'present' ? 'active' : ''}" onclick="setResponse('${s.id}', 'present')"><i class="fas fa-check"></i> Présent</button><button class="btn-absent ${status === 'absent' ? 'active' : ''}" onclick="setResponse('${s.id}', 'absent')"><i class="fas fa-times"></i> Absent</button></div></div>`;
            }
            container.innerHTML = html + '</div></div>';
        }

        async function setResponse(sessionId, status) {
            if (!currentCandidate) return;
            await db.collection("responses").doc(`${currentCandidate.code}_${sessionId}`).set({
                candidateCode: currentCandidate.code, candidateName: currentCandidate.name,
                sessionId, status, updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            loadCandidateSessions();
            if (isAdmin) loadAdminDashboard();
        }

        function showAdminLogin() { document.getElementById('adminModal').style.display = 'flex'; }
        function checkAdminLogin() {
            if (document.getElementById('adminPassword').value === "Ekipelo") {
                isAdmin = true;
                document.getElementById('adminModal').style.display = 'none';
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('candidateSection').style.display = 'none';
                document.getElementById('adminDashboard').style.display = 'block';
                document.getElementById('logoutBtn').style.display = 'inline-block';
                document.getElementById('programBtn').style.display = 'inline-block';
                loadAdminDashboard(); displayProgrammedWeeks();
            } else alert("Mot de passe incorrect");
        }

        async function loadAdminDashboard() {
            const total = Object.keys(candidates).length;
            document.getElementById('totalCandidates').innerText = total;
            const sessions = await getCurrentWeekSessions();
            const container = document.getElementById('adminSessionsContainer');
            if (!sessions.length) { container.innerHTML = '<div class="session-stats"><h3>Aucune session active</h3></div>'; return; }
            let html = '';
            for (const s of sessions) {
                const respSnap = await db.collection("responses").where("sessionId", "==", s.id).get();
                const respMap = {}; respSnap.forEach(d => respMap[d.data().candidateCode] = d.data().status);
                let present=0, absent=0, noResp=0;
                for (const code in candidates) {
                    if (respMap[code] === 'present') present++;
                    else if (respMap[code] === 'absent') absent++;
                    else noResp++;
                }
                html += `<div class="session-stats" id="session-${s.id}"><h3>${s.day} ${s.displayDate}</h3><div class="stat-detail"><strong>👥 Total :</strong> ${total}</div><div class="stat-detail" style="color:#10b981">✓ Présents : ${present}</div><div class="stat-detail" style="color:#ef4444">✗ Absents : ${absent}</div><div class="stat-detail" style="color:#f59e0b">⏳ Sans réponse : ${noResp}</div><button class="expand-btn" onclick="toggleCandidateList('${s.id}')">Détails</button><div id="list-${s.id}" class="candidate-list"></div></div>`;
            }
            container.innerHTML = html;
        }

        window.toggleCandidateList = async function(sessionId) {
            const listDiv = document.getElementById(`list-${sessionId}`);
            if (listDiv.classList.contains('show')) { listDiv.classList.remove('show'); return; }
            const respSnap = await db.collection("responses").where("sessionId", "==", sessionId).get();
            const respMap = {}; respSnap.forEach(d => respMap[d.data().candidateCode] = d.data().status);
            let present=[], absent=[], noResp=[];
            for (const [code, name] of Object.entries(candidates)) {
                const st = respMap[code];
                if (st === 'present') present.push(name);
                else if (st === 'absent') absent.push(name);
                else noResp.push(name);
            }
            listDiv.innerHTML = `<div><strong style="color:#10b981">✓ Présents (${present.length}) :</strong><br>${present.map(n=>`<div class="candidate-item">• ${n}</div>`).join('')||'<div>Aucun</div>'}</div><div><strong style="color:#ef4444">✗ Absents (${absent.length}) :</strong><br>${absent.map(n=>`<div class="candidate-item">• ${n}</div>`).join('')||'<div>Aucun</div>'}</div><div><strong style="color:#f59e0b">⏳ Sans réponse (${noResp.length}) :</strong><br>${noResp.map(n=>`<div class="candidate-item">• ${n}</div>`).join('')||'<div>Aucun</div>'}</div>`;
            listDiv.classList.add('show');
        };

        function showProgramModal() {
            document.getElementById('programModal').style.display = 'flex';
            document.getElementById('programForm').style.display = 'none';
            document.getElementById('pinError').style.display = 'none';
            document.getElementById('pinCode').value = '';
            hasPinAccess = false;
            resetDaySlots();
        }

        function resetDaySlots() {
            const container = document.getElementById('dynamicDaysContainer');
            container.innerHTML = `<div class="day-slot" data-index="0"><select class="day-select"><option value="Lundi">Lundi</option><option value="Mardi">Mardi</option><option value="Mercredi">Mercredi</option><option value="Jeudi">Jeudi</option><option value="Vendredi">Vendredi</option><option value="Samedi">Samedi</option></select><input type="date" class="date-picker"><button type="button" class="remove-day" onclick="removeDaySlot(this)" style="display:none;">🗑️</button></div>`;
            attachPreviewEvent();
        }

        function attachPreviewEvent() {
            document.querySelectorAll('.day-select, .date-picker').forEach(el => el.addEventListener('change', updatePreview));
            updatePreview();
        }

        function addDaySlot() {
            const container = document.getElementById('dynamicDaysContainer');
            const index = container.children.length;
            const newSlot = document.createElement('div');
            newSlot.className = 'day-slot';
            newSlot.setAttribute('data-index', index);
            newSlot.innerHTML = `<select class="day-select"><option value="Lundi">Lundi</option><option value="Mardi">Mardi</option><option value="Mercredi">Mercredi</option><option value="Jeudi">Jeudi</option><option value="Vendredi">Vendredi</option><option value="Samedi">Samedi</option></select><input type="date" class="date-picker"><button type="button" class="remove-day" onclick="removeDaySlot(this)">🗑️</button>`;
            container.appendChild(newSlot);
            newSlot.querySelectorAll('.day-select, .date-picker').forEach(el => el.addEventListener('change', updatePreview));
            updatePreview();
            if (container.children.length > 1) document.querySelectorAll('.remove-day').forEach(btn => btn.style.display = 'inline-block');
        }

        function removeDaySlot(btn) {
            const container = document.getElementById('dynamicDaysContainer');
            if (container.children.length === 1) return;
            btn.closest('.day-slot').remove();
            if (container.children.length === 1) document.querySelector('.remove-day').style.display = 'none';
            updatePreview();
        }

        function updatePreview() {
            const slots = document.querySelectorAll('#dynamicDaysContainer .day-slot');
            let previewHtml = '<strong>Aperçu des séances :</strong><ul>';
            let valid = true;
            slots.forEach((slot, idx) => {
                const day = slot.querySelector('.day-select').value;
                const date = slot.querySelector('.date-picker').value;
                if (date) previewHtml += `<li>${day} ${new Date(date).toLocaleDateString('fr-FR')}</li>`;
                else { previewHtml += `<li style="color:#ef4444">Jour ${idx+1} : sélectionnez une date</li>`; valid = false; }
            });
            previewHtml += '</ul>';
            document.getElementById('sessionsPreview').innerHTML = previewHtml;
        }

        function verifyPinAndShowForm() {
            const pin = document.getElementById('pinCode').value;
            if (pin === "0022") {
                document.getElementById('programForm').style.display = 'block';
                document.getElementById('pinError').style.display = 'none';
                hasPinAccess = true;
                resetDaySlots();
                if (isAdmin) displayProgrammedWeeks();
            } else {
                document.getElementById('pinError').style.display = 'block';
                document.getElementById('programForm').style.display = 'none';
                hasPinAccess = false;
                if (isAdmin) displayProgrammedWeeks();
            }
        }

        async function programFormation() {
            if (!hasPinAccess) { alert("Code PIN invalide."); return; }
            const weekNumber = parseInt(document.getElementById('weekNumber').value);
            if (!weekNumber || weekNumber < 1) { alert("Numéro de semaine valide requis."); return; }
            const slots = document.querySelectorAll('#dynamicDaysContainer .day-slot');
            const sessionsData = [];
            for (let slot of slots) {
                const day = slot.querySelector('.day-select').value;
                const date = slot.querySelector('.date-picker').value;
                if (!date) { alert(`Veuillez choisir une date pour le jour ${day}`); return; }
                sessionsData.push({ day, date });
            }
            if (sessionsData.length === 0) { alert("Ajoutez au moins un jour de formation."); return; }
            const existing = await loadProgrammedSessions();
            if (existing.some(w => w.weekNumber === weekNumber)) { alert(`Semaine ${weekNumber} déjà programmée.`); return; }
            await saveProgrammedWeek(weekNumber, sessionsData);
            document.getElementById('programModal').style.display = 'none';
            await loadProgrammedSessions();
            displayProgrammedWeeks();
            if (isAdmin) loadAdminDashboard();
            alert(`Formation semaine ${weekNumber} programmée avec ${sessionsData.length} séance(s).`);
        }

        async function displayProgrammedWeeks() {
            const weeks = await loadProgrammedSessions();
            const container = document.getElementById('programmedWeeksContainer');
            if (!weeks.length) { container.innerHTML = '<div class="session-stats"><h3>Aucune formation programmée</h3></div>'; return; }
            let html = '<div class="session-stats"><h3>📅 Formations programmées</h3>';
            for (const w of weeks.sort((a,b)=>a.weekNumber-b.weekNumber)) {
                const sessionsHtml = w.sessions.map(s => `<div>${s.day} : ${new Date(s.date).toLocaleDateString('fr-FR')}</div>`).join('');
                const delBtn = hasPinAccess ? `<button class="delete-week-btn" onclick="deleteProgrammedWeek(${w.weekNumber})"><i class="fas fa-trash"></i> Supprimer tout</button>` : '<span style="color:#6b7280;"><i class="fas fa-lock"></i> Suppression avec code 0022</span>';
                html += `<div class="week-program-item"><div><strong>Semaine ${w.weekNumber}</strong><div class="sessions-preview" style="margin-top:8px;">${sessionsHtml}</div></div>${delBtn}</div>`;
            }
            container.innerHTML = html + '</div>';
        }

        function logout() {
            localStorage.removeItem('candidateCode');
            currentCandidate = null; isAdmin = false; hasPinAccess = false;
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('candidateSection').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'none';
            document.getElementById('programBtn').style.display = 'none';
            document.getElementById('candidateCode').value = '';
        }

        async function checkSavedLogin() {
            const saved = localStorage.getItem('candidateCode');
            if (saved && candidates[saved]) {
                currentCandidate = { code: saved, name: candidates[saved] };
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('candidateSection').style.display = 'block';
                document.getElementById('logoutBtn').style.display = 'inline-block';
                document.getElementById('welcomeName').innerHTML = candidates[saved];
                document.getElementById('greetingMessage').innerHTML = `Bonjour ${candidates[saved]}`;
                await loadCandidateSessions();
            }
        }

        window.onclick = function(e) { if (e.target.classList.contains('modal')) e.target.style.display = 'none'; };
        document.getElementById('pinCode')?.addEventListener('input', verifyPinAndShowForm);
        checkSavedLogin();
        setInterval(async () => { if (currentCandidate && !isAdmin) loadCandidateSessions(); if (isAdmin) { loadAdminDashboard(); displayProgrammedWeeks(); } }, 60000);
    </script>
