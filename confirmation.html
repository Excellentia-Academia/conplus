<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Excellentia Academia - Gestion des présences</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #0f0f2a 100%);
            min-height: 100vh;
            color: #fff;
        }

        /* Navigation */
        .nav-bar {
            background: rgba(10, 10, 26, 0.95);
            backdrop-filter: blur(12px);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #d4af37, #f5e6a3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .admin-btn {
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.5);
            color: #d4af37;
            padding: 10px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .admin-btn:hover {
            background: #d4af37;
            color: #0a0a1a;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            padding: 10px 24px;
            border-radius: 50px;
            cursor: pointer;
            margin-left: 12px;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* Section Connexion */
        .login-section {
            max-width: 500px;
            margin: 80px auto;
            text-align: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 48px 40px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .login-card h2 {
            font-size: 1.8rem;
            margin-bottom: 12px;
            color: #d4af37;
        }

        .login-card p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 32px;
        }

        .code-input {
            width: 100%;
            padding: 16px 20px;
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 4px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: 16px;
            color: #fff;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .code-input:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #d4af37, #b8941e);
            border: none;
            padding: 14px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            color: #0a0a1a;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }

        /* Espace Candidat */
        .candidate-section {
            display: none;
        }

        .welcome-card {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(212, 175, 55, 0.05));
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 32px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .welcome-card h1 {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .welcome-card .greeting {
            color: #d4af37;
            font-size: 1.1rem;
        }

        /* Semaine en cours */
        .week-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 32px;
        }

        .week-header {
            background: rgba(212, 175, 55, 0.2);
            padding: 20px 28px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }

        .week-header h2 {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .week-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }

        .session-list {
            padding: 20px 28px;
        }

        .session-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            transition: all 0.3s ease;
        }

        .session-item:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .session-info {
            flex: 1;
        }

        .session-date {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .session-day {
            font-size: 0.85rem;
            color: #d4af37;
        }

        .session-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-top: 8px;
        }

        .status-present {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .status-absent {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .response-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-present, .btn-absent {
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 0.9rem;
        }

        .btn-present {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid #10b981;
            color: #10b981;
        }

        .btn-present:hover, .btn-present.active {
            background: #10b981;
            color: white;
        }

        .btn-absent {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #ef4444;
        }

        .btn-absent:hover, .btn-absent.active {
            background: #ef4444;
            color: white;
        }

        /* Admin Dashboard */
        .admin-dashboard {
            display: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #d4af37;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.6);
            margin-top: 8px;
        }

        .session-stats {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 40px;
        }

        .session-stats h3 {
            margin-bottom: 20px;
            color: #d4af37;
        }

        .stat-detail {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .expand-btn {
            background: rgba(212, 175, 55, 0.2);
            border: none;
            color: #d4af37;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 12px;
        }

        .candidate-list {
            margin-top: 16px;
            display: none;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 16px;
        }

        .candidate-list.show {
            display: block;
        }

        .candidate-item {
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
        }

        /* Modal Admin Login */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #0f0f1a, #0a0a12);
            border-radius: 32px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .modal-content h2 {
            color: #d4af37;
            margin-bottom: 24px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: 20px 16px; }
            .session-item { flex-direction: column; text-align: center; }
            .response-buttons { justify-content: center; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <div class="logo">Excellentia Academia</div>
        <div>
            <button class="admin-btn" onclick="showAdminLogin()">
                <i class="fas fa-chart-line"></i> Administration
            </button>
            <button class="logout-btn" onclick="logout()" style="display:none" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> Déconnexion
            </button>
        </div>
    </div>

    <div class="container">
        <!-- Section Connexion -->
        <div id="loginSection" class="login-section">
            <div class="login-card">
                <h2>Espace Candidat</h2>
                <p>Entrez votre code unique pour accéder à votre espace personnel</p>
                <input type="text" id="candidateCode" class="code-input" placeholder="Ex: 7K2M" maxlength="4" autocomplete="off">
                <button class="login-btn" onclick="loginCandidate()">
                    <i class="fas fa-arrow-right"></i> Se connecter
                </button>
            </div>
        </div>

        <!-- Espace Candidat -->
        <div id="candidateSection" class="candidate-section">
            <div class="welcome-card">
                <h1 id="welcomeName"></h1>
                <div class="greeting" id="greetingMessage"></div>
            </div>
            <div id="currentWeekContainer"></div>
        </div>

        <!-- Admin Dashboard -->
        <div id="adminDashboard" class="admin-dashboard">
            <h2 style="margin-bottom: 24px;">Tableau de bord</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalCandidates">0</div>
                    <div class="stat-label">Total candidats</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalPresent">0</div>
                    <div class="stat-label">Total présents</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalAbsent">0</div>
                    <div class="stat-label">Total absents</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalNoResponse">0</div>
                    <div class="stat-label">Sans réponse</div>
                </div>
            </div>
            <div id="adminSessionsContainer"></div>
        </div>
    </div>

    <!-- Modal Admin Login -->
    <div id="adminModal" class="modal">
        <div class="modal-content">
            <h2>Accès Administrateur</h2>
            <input type="password" id="adminPassword" class="code-input" placeholder="Mot de passe">
            <button class="login-btn" onclick="checkAdminLogin()">Valider</button>
        </div>
    </div>

    <script>
        // Configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCOSnZ0ogR05svM0SbALqSlNqmODDDlIyw",
            authDomain: "conf-94615.firebaseapp.com",
            projectId: "conf-94615",
            storageBucket: "conf-94615.firebasestorage.app",
            messagingSenderId: "312554343685",
            appId: "1:312554343685:web:b199e33ff4ca050d533b6c",
            measurementId: "G-BLCPS9S0ZJ"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Liste des candidats
        const candidates = {
            "7K2M": "Abraham Mudanda Lubuku", "4R8P": "Adju Abdallah Djuma",
            "1N5T": "Amerack Mavinga Ntali", "9C3V": "Arsène Sangwa Binanga",
            "6L2Q": "Beni Fungamali Ramazani", "3H8X": "Beni Musiteki",
            "5D1Z": "Benjamin Kabeya Kapongo", "8W4J": "Bernadine Mandanda Mbangu",
            "2F7Y": "Bijou Belanza", "0M9B": "Blessing Alonga Winner",
            "7G4C": "Brineige Massamba Bateka", "4K1R": "Christian Mbo Ntali",
            "9P6H": "Christiane Bongoma Tondo", "3N8W": "Claudel Elonga Mabelongo",
            "6D2X": "Daniella Makululu Bebela", "1H5L": "Darlène Yowa Ngandu",
            "8R4F": "David Kitengie Malangu", "2Q7M": "David Mukendi Kajingulu",
            "5T9C": "David Nakweti Musikwela", "0F3K": "Dieudonné Mundala Kiomba",
            "7L1P": "Divine Mugolika Shemwa", "4J8Y": "Divine Mwamba Bipendwa",
            "9G5D": "Divine Nlandu Nsakanunu", "2W6H": "Émeraude Kanene Samba",
            "6P0R": "Enoch Bilha Kalonda", "1S9M": "Eric Bulembi Mafuku",
            "8H4L": "Espérance Kikadi Nzuzi", "3Q7F": "Eugenie Nabintu Basirwa",
            "5K2N": "Eunice Omokoko Baby", "0W9P": "Exaúde Mikila Waney",
            "7D3J": "Furah Kipata", "4M8R": "Gaspard Mwima Mupila",
            "9F1X": "Glody Loleke Eleembe", "2B6Q": "Gremis Flevia Funga Funga",
            "6R3L": "Henock Bole Fowetshi", "1P7H": "Henry Lukonga Butumbi",
            "8K4G": "Jean Djemondo Toss", "4H9W": "Jenovic Sumaili Letashi",
            "7M2D": "Joyce Aziza Azama", "3C8P": "Joyce Eke-Shombakapinga",
            "5L1S": "Junior Muteba Biayi", "9R7J": "Mersei Kanemeka Wa Nzambi",
            "2P4K": "Merveille Tshiala Mwana", "6H0Q": "Nicky Musadi Bitota",
            "1D8M": "Remi Kingambo", "8S5F": "Rodrick Banza",
            "4Q2L": "Rose Matunda", "7H3C": "Ruth Kalonga Ndaya",
            "9M6K": "Théovie Gabriel Ibambu", "3R0P": "Thomas Kashavu Muhigirwa",
            "5F8H": "Wilhelmine Safi Bagabo", "1A2A": "Ekip"
        };

        let currentCandidate = null;
        let isAdmin = false;

        // Générer les séances (5 semaines, Mercredi et Jeudi)
        function generateSessions() {
            const sessions = [];
            const startDate = new Date(2026, 5, 3); // 3 juin 2026
            
            for (let week = 0; week < 5; week++) {
                const wednesday = new Date(startDate);
                wednesday.setDate(startDate.getDate() + (week * 7));
                const thursday = new Date(wednesday);
                thursday.setDate(wednesday.getDate() + 1);
                
                sessions.push({
                    id: `week${week+1}_wed`,
                    week: week + 1,
                    date: wednesday.toISOString().split('T')[0],
                    day: "Mercredi",
                    displayDate: wednesday.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' })
                });
                sessions.push({
                    id: `week${week+1}_thu`,
                    week: week + 1,
                    date: thursday.toISOString().split('T')[0],
                    day: "Jeudi",
                    displayDate: thursday.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' })
                });
            }
            return sessions;
        }

        const allSessions = generateSessions();

        // Obtenir la semaine en cours
        function getCurrentWeek() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const startDate = new Date(2026, 5, 3);
            
            for (let week = 0; week < 5; week++) {
                const weekStart = new Date(startDate);
                weekStart.setDate(startDate.getDate() + (week * 7));
                const weekEnd = new Date(weekStart);
                weekEnd.setDate(weekStart.getDate() + 6);
                
                if (today >= weekStart && today <= weekEnd) {
                    return week + 1;
                }
            }
            return 6; // Après la fin
        }

        // Obtenir les sessions de la semaine en cours
        function getCurrentWeekSessions() {
            const currentWeek = getCurrentWeek();
            if (currentWeek > 5) return [];
            return allSessions.filter(s => s.week === currentWeek);
        }

        // Obtenir le message de salutation selon l'heure
        function getGreeting(name) {
            const hour = new Date().getHours();
            const greeting = hour < 12 ? "Bonjour" : (hour < 18 ? "Bon après-midi" : "Bonsoir");
            return `${greeting} ${name}`;
        }

        // Connexion candidat
        async function loginCandidate() {
            const code = document.getElementById('candidateCode').value.toUpperCase().trim();
            
            if (candidates[code]) {
                currentCandidate = { code, name: candidates[code] };
                localStorage.setItem('candidateCode', code);
                
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('candidateSection').style.display = 'block';
                document.getElementById('logoutBtn').style.display = 'inline-block';
                
                document.getElementById('welcomeName').innerHTML = candidates[code];
                document.getElementById('greetingMessage').innerHTML = getGreeting(candidates[code]);
                
                loadCandidateSessions();
            } else {
                alert("Code invalide. Veuillez réessayer.");
            }
        }

        // Charger les sessions du candidat
        async function loadCandidateSessions() {
            const sessions = getCurrentWeekSessions();
            const container = document.getElementById('currentWeekContainer');
            
            if (sessions.length === 0) {
                container.innerHTML = '<div class="week-card"><div class="week-header"><h2>Concours terminé</h2><p>Merci pour votre participation !</p></div></div>';
                return;
            }
            
            let html = `<div class="week-card">
                <div class="week-header">
                    <h2>Semaine ${sessions[0].week}</h2>
                    <p>Merci de confirmer votre présence pour chaque séance</p>
                </div>
                <div class="session-list">`;
            
            for (const session of sessions) {
                // Récupérer la réponse du candidat pour cette session
                const docRef = db.collection("responses").doc(`${currentCandidate.code}_${session.id}`);
                const doc = await docRef.get();
                const response = doc.exists ? doc.data().status : null;
                
                html += `
                    <div class="session-item">
                        <div class="session-info">
                            <div class="session-date">${session.day} ${session.displayDate}</div>
                            <div class="session-status ${response === 'present' ? 'status-present' : (response === 'absent' ? 'status-absent' : 'status-pending')}">
                                ${response === 'present' ? '✓ Présent' : (response === 'absent' ? '✗ Absent' : '⏳ En attente de réponse')}
                            </div>
                        </div>
                        <div class="response-buttons">
                            <button class="btn-present ${response === 'present' ? 'active' : ''}" onclick="setResponse('${session.id}', 'present')">
                                <i class="fas fa-check"></i> Je serai présent
                            </button>
                            <button class="btn-absent ${response === 'absent' ? 'active' : ''}" onclick="setResponse('${session.id}', 'absent')">
                                <i class="fas fa-times"></i> Je serai absent
                            </button>
                        </div>
                    </div>
                `;
            }
            
            html += `</div></div>`;
            container.innerHTML = html;
        }

        // Enregistrer la réponse
        async function setResponse(sessionId, status) {
            if (!currentCandidate) return;
            
            await db.collection("responses").doc(`${currentCandidate.code}_${sessionId}`).set({
                candidateCode: currentCandidate.code,
                candidateName: currentCandidate.name,
                sessionId: sessionId,
                status: status,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            loadCandidateSessions();
            if (isAdmin) loadAdminDashboard();
        }

        // Admin: Afficher le modal de connexion
        function showAdminLogin() {
            document.getElementById('adminModal').style.display = 'flex';
        }

        // Admin: Vérifier le mot de passe
        function checkAdminLogin() {
            const password = document.getElementById('adminPassword').value;
            if (password === "Ekipelo") {
                isAdmin = true;
                document.getElementById('adminModal').style.display = 'none';
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('candidateSection').style.display = 'none';
                document.getElementById('adminDashboard').style.display = 'block';
                document.getElementById('logoutBtn').style.display = 'inline-block';
                loadAdminDashboard();
            } else {
                alert("Mot de passe incorrect");
            }
        }

        // Admin: Charger le dashboard
        async function loadAdminDashboard() {
            const totalCandidates = Object.keys(candidates).length;
            document.getElementById('totalCandidates').innerText = totalCandidates;
            
            const sessions = getCurrentWeekSessions();
            const container = document.getElementById('adminSessionsContainer');
            
            if (sessions.length === 0) {
                container.innerHTML = '<div class="session-stats"><h3>Aucune session en cours</h3></div>';
                return;
            }
            
            let html = '';
            
            for (const session of sessions) {
                // Compter les réponses pour cette session
                const responsesSnapshot = await db.collection("responses").where("sessionId", "==", session.id).get();
                const responses = {};
                responsesSnapshot.forEach(doc => {
                    responses[doc.data().candidateCode] = doc.data().status;
                });
                
                let present = 0, absent = 0, noResponse = 0;
                
                for (const code in candidates) {
                    if (responses[code] === 'present') present++;
                    else if (responses[code] === 'absent') absent++;
                    else noResponse++;
                }
                
                html += `
                    <div class="session-stats" id="session-${session.id}">
                        <h3>${session.day} ${session.displayDate}</h3>
                        <div class="stat-detail"><strong>Total :</strong> ${totalCandidates}</div>
                        <div class="stat-detail" style="color:#10b981"><strong>Présents :</strong> ${present}</div>
                        <div class="stat-detail" style="color:#ef4444"><strong>Absents :</strong> ${absent}</div>
                        <div class="stat-detail" style="color:#f59e0b"><strong>Sans réponse :</strong> ${noResponse}</div>
                        <button class="expand-btn" onclick="toggleCandidateList('${session.id}', '${session.day}', ${present}, ${absent}, ${noResponse})">
                            <i class="fas fa-users"></i> Voir les détails
                        </button>
                        <div id="list-${session.id}" class="candidate-list"></div>
                    </div>
                `;
            }
            
            container.innerHTML = html;
        }

        // Admin: Afficher la liste des candidats par statut
        async function toggleCandidateList(sessionId, day, present, absent, noResponse) {
            const listDiv = document.getElementById(`list-${sessionId}`);
            
            if (listDiv.classList.contains('show')) {
                listDiv.classList.remove('show');
                return;
            }
            
            const responsesSnapshot = await db.collection("responses").where("sessionId", "==", sessionId).get();
            const responses = {};
            responsesSnapshot.forEach(doc => {
                responses[doc.data().candidateCode] = doc.data().status;
            });
            
            let presentList = [], absentList = [], noResponseList = [];
            
            for (const [code, name] of Object.entries(candidates)) {
                const status = responses[code];
                if (status === 'present') presentList.push(name);
                else if (status === 'absent') absentList.push(name);
                else noResponseList.push(name);
            }
            
            listDiv.innerHTML = `
                <div style="margin-bottom: 12px;"><strong style="color:#10b981">✓ Présents (${presentList.length}) :</strong><br>
                    ${presentList.map(n => `<div class="candidate-item">• ${n}</div>`).join('') || '<div class="candidate-item">Aucun</div>'}
                </div>
                <div style="margin-bottom: 12px;"><strong style="color:#ef4444">✗ Absents (${absentList.length}) :</strong><br>
                    ${absentList.map(n => `<div class="candidate-item">• ${n}</div>`).join('') || '<div class="candidate-item">Aucun</div>'}
                </div>
                <div><strong style="color:#f59e0b">⏳ Sans réponse (${noResponseList.length}) :</strong><br>
                    ${noResponseList.map(n => `<div class="candidate-item">• ${n}</div>`).join('') || '<div class="candidate-item">Aucun</div>'}
                </div>
            `;
            
            listDiv.classList.add('show');
        }

        // Déconnexion
        function logout() {
            localStorage.removeItem('candidateCode');
            currentCandidate = null;
            isAdmin = false;
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('candidateSection').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'none';
            document.getElementById('candidateCode').value = '';
        }

        // Vérifier si un candidat est déjà connecté
        function checkSavedLogin() {
            const savedCode = localStorage.getItem('candidateCode');
            if (savedCode && candidates[savedCode]) {
                currentCandidate = { code: savedCode, name: candidates[savedCode] };
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('candidateSection').style.display = 'block';
                document.getElementById('logoutBtn').style.display = 'inline-block';
                document.getElementById('welcomeName').innerHTML = candidates[savedCode];
                document.getElementById('greetingMessage').innerHTML = getGreeting(candidates[savedCode]);
                loadCandidateSessions();
            }
        }

        // Initialisation
        checkSavedLogin();
        
        // Mettre à jour l'affichage automatiquement (chaque minute)
        setInterval(() => {
            if (currentCandidate && !isAdmin) loadCandidateSessions();
            if (isAdmin) loadAdminDashboard();
        }, 60000);
    </script>
</body>
</html>
