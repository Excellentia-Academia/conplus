<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Excellentia Academia | Éloquence en Scène - Inscription</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-storage-compat.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(145deg, #0a0c12 0%, #0f1117 100%);
            min-height: 100vh;
            color: #eef2ff;
            position: relative;
            overflow-x: hidden;
        }

        /* Particules d'arrière-plan animées */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(225, 29, 72, 0.4) 0%, rgba(37, 99, 235, 0.2) 100%);
            border-radius: 50%;
            animation: floatParticle 15s infinite ease-in-out;
            filter: blur(2px);
        }

        @keyframes floatParticle {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        /* Glow animé */
        .glow {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(225,29,72,0.15) 0%, rgba(37,99,235,0.05) 50%, transparent 70%);
            transform: translate(-50%, -50%);
            animation: pulseGlow 8s infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes pulseGlow {
            0% { opacity: 0.3; transform: translate(-50%, -50%) scale(0.8); }
            100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.2); }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        /* Header avec image */
        .hero-section {
            position: relative;
            margin-bottom: 40px;
            border-radius: 48px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .hero-section:hover {
            transform: translateY(-8px);
            box-shadow: 0 35px 60px -15px rgba(225,29,72,0.3);
        }

        .hero-image {
            width: 100%;
            height: 320px;
            object-fit: cover;
            display: block;
            filter: brightness(0.85) saturate(1.1);
            transition: all 0.7s ease;
        }

        .hero-section:hover .hero-image {
            transform: scale(1.02);
            filter: brightness(0.95) saturate(1.2);
        }

        .hero-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(0deg, rgba(10,12,18,0.95) 0%, rgba(10,12,18,0.4) 100%);
            padding: 40px 30px;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #e11d48, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            text-shadow: 0 2px 10px rgba(225,29,72,0.3);
            animation: titleGlow 3s infinite alternate;
        }

        @keyframes titleGlow {
            0% { filter: drop-shadow(0 0 5px rgba(225,29,72,0.3)); }
            100% { filter: drop-shadow(0 0 20px rgba(225,29,72,0.6)); }
        }

        .hero-subtitle {
            font-size: 1.1rem;
            color: #cbd5e6;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        /* Formulaire principal */
        .form-card {
            background: rgba(20, 24, 35, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 40px;
            border: 1px solid rgba(225, 29, 72, 0.25);
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.4);
            transition: all 0.4s ease;
        }

        .form-card:hover {
            border-color: rgba(225, 29, 72, 0.5);
            box-shadow: 0 25px 45px -12px rgba(225,29,72,0.2);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .hero-title { font-size: 2.5rem; }
            .hero-image { height: 220px; }
            .form-card { padding: 25px; }
        }

        .input-group {
            position: relative;
            margin-bottom: 5px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #e11d48;
        }

        .input-group input, .input-group textarea, .input-group select {
            width: 100%;
            padding: 16px 18px;
            background: rgba(10, 12, 18, 0.8);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            font-size: 1rem;
            color: white;
            transition: all 0.3s ease;
            font-family: 'Montserrat', sans-serif;
        }

        .input-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .input-group input:focus, .input-group textarea:focus, .input-group select:focus {
            outline: none;
            border-color: #e11d48;
            box-shadow: 0 0 0 4px rgba(225,29,72,0.2);
            transform: scale(1.01);
        }

        .file-upload {
            position: relative;
            border: 2px dashed rgba(225,29,72,0.5);
            border-radius: 28px;
            padding: 25px;
            text-align: center;
            background: rgba(10,12,18,0.5);
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-upload:hover {
            border-color: #e11d48;
            background: rgba(225,29,72,0.1);
        }

        .file-upload i {
            font-size: 2.5rem;
            color: #e11d48;
            margin-bottom: 10px;
        }

        .file-name {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .submit-btn {
            background: linear-gradient(135deg, #e11d48, #9f1239);
            border: none;
            padding: 18px 35px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .submit-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px -10px #e11d48;
        }

        /* Admin Button */
        .admin-lock {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            border: 2px solid #e11d48;
            box-shadow: 0 0 20px rgba(225,29,72,0.4);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .admin-lock:hover {
            transform: scale(1.1) rotate(15deg);
            box-shadow: 0 0 30px rgba(225,29,72,0.8);
        }

        .admin-lock i {
            font-size: 1.8rem;
            color: #e11d48;
        }

        /* Modals */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: linear-gradient(145deg, #14181f, #0f1117);
            border-radius: 48px;
            max-width: 500px;
            width: 100%;
            padding: 35px;
            border: 1px solid rgba(225,29,72,0.5);
            animation: modalSlide 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes modalSlide {
            from { opacity: 0; transform: translateY(-40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .modal-content h2 {
            font-family: 'Playfair Display', serif;
            margin-bottom: 20px;
            color: #e11d48;
        }

        .admin-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0c12;
            z-index: 3000;
            overflow-y: auto;
            display: none;
        }

        .admin-header {
            background: linear-gradient(135deg, #0f1117, #1a1f2c);
            padding: 30px;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 2px solid #e11d48;
        }

        .admin-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            padding: 30px;
        }

        .candidate-admin-card {
            background: #14181f;
            border-radius: 32px;
            padding: 20px;
            border: 1px solid rgba(225,29,72,0.3);
            transition: all 0.3s;
        }

        .candidate-admin-card:hover {
            transform: translateY(-5px);
            border-color: #e11d48;
            box-shadow: 0 15px 30px -10px rgba(225,29,72,0.3);
        }

        .video-preview {
            background: #000;
            border-radius: 20px;
            margin: 15px 0;
            overflow: hidden;
        }

        .video-preview video {
            width: 100%;
            max-height: 200px;
        }

        .badge {
            background: #e11d48;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            display: inline-block;
            margin: 5px;
        }

        .alert {
            padding: 12px 18px;
            border-radius: 28px;
            margin: 15px 0;
            display: none;
        }

        .alert.success { background: #10b98120; border: 1px solid #10b981; color: #10b981; }
        .alert.error { background: #ef444420; border: 1px solid #ef4444; color: #ef4444; }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            float: right;
        }
    </style>
</head>
<body>

<div class="particles" id="particles"></div>
<div class="glow"></div>

<div class="container">
    <div class="hero-section">
        <img src="IMG_1812.jpeg" alt="Structure Organisation Centre" class="hero-image" onerror="this.src='https://placehold.co/1200x400/1e293b/e11d48?text=Excellentia+Academia'">
        <div class="hero-overlay">
            <h1 class="hero-title">Éloquence en Scène</h1>
            <p class="hero-subtitle">Révélez votre talent oratoire - Inscrivez-vous dès maintenant</p>
        </div>
    </div>

    <div class="form-card">
        <form id="inscriptionForm">
            <div class="form-grid">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> Nom</label>
                    <input type="text" id="nom" placeholder="Votre nom" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-user"></i> Postnom</label>
                    <input type="text" id="postnom" placeholder="Postnom">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-user"></i> Prénom</label>
                    <input type="text" id="prenom" placeholder="Votre prénom" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-university"></i> Université</label>
                    <input type="text" id="universite" placeholder="Université / Institution" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-calendar"></i> Promotion</label>
                    <input type="text" id="promotion" placeholder="Année / Promotion" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-book"></i> Faculté</label>
                    <input type="text" id="faculte" placeholder="Faculté / Département" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-phone"></i> Téléphone</label>
                    <input type="tel" id="telephone" placeholder="+243 XX XXX XXXX" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-heart"></i> Motivation</label>
                    <textarea id="motivation" placeholder="Pourquoi souhaitez-vous participer ? (max 500 caractères)" required></textarea>
                </div>
            </div>
            
            <div class="input-group">
                <label><i class="fas fa-video"></i> Vidéo d'enregistrement (sujet au choix)</label>
                <div class="file-upload" id="videoUploadArea">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>Cliquez ou déposez votre vidéo</p>
                    <p style="font-size: 0.7rem; margin-top: 5px;">MP4, MOV, WebM - Max 100MB</p>
                    <input type="file" id="videoFile" accept="video/*" style="display: none;">
                    <div class="file-name" id="fileName"></div>
                </div>
            </div>
            
            <button type="submit" class="submit-btn">
                <i class="fas fa-pen-fancy"></i> S'INSCRIRE AU CONCOURS
            </button>
            <div id="formAlert" class="alert"></div>
        </form>
    </div>
</div>

<!-- Admin Lock -->
<div class="admin-lock" id="adminLockBtn">
    <i class="fas fa-lock"></i>
</div>

<!-- Admin Password Modal -->
<div class="modal" id="adminPasswordModal">
    <div class="modal-content">
        <button class="close-btn" id="closeAdminModal">&times;</button>
        <h2><i class="fas fa-shield-alt"></i> Accès Organisateur</h2>
        <input type="password" id="adminPassInput" placeholder="Mot de passe" style="width:100%; padding:15px; border-radius:30px; background:#1e293b; border:none; color:white; margin:20px 0;">
        <button id="submitAdminPass" class="submit-btn" style="background:#e11d48;">DÉVERROUILLER</button>
        <div id="adminPassAlert" class="alert"></div>
    </div>
</div>

<!-- Admin Panel -->
<div class="admin-panel" id="adminPanel">
    <div class="admin-header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1 style="color:#e11d48;"><i class="fas fa-crown"></i> PANEL ORGANISATEUR</h1>
            <button id="closeAdminPanelBtn" style="background:#e11d48; border:none; padding:12px 25px; border-radius:40px; color:white; cursor:pointer;"><i class="fas fa-times"></i> Fermer</button>
        </div>
        <p>Gestion des candidats & vidéos</p>
    </div>
    <div id="adminCandidatesContainer" class="admin-cards">
        <div style="text-align:center; padding:50px;">Chargement des candidats...</div>
    </div>
</div>

<script>
    // ========== FIREBASE CONFIG ==========
    const firebaseConfig = {
        apiKey: "AIzaSyBAH1ykxic8hH2xrxeNwHg_cVQFEkHyIAo",
        authDomain: "pitch-c6e9a.firebaseapp.com",
        projectId: "pitch-c6e9a",
        storageBucket: "pitch-c6e9a.firebasestorage.app",
        messagingSenderId: "37902068065",
        appId: "1:37902068065:web:7f597cbb003fb6c5c07d20",
        measurementId: "G-H7T7BEW22T"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();
    
    // Variables
    let selectedFile = null;
    const ADMIN_PASSWORD = "oncommence5";
    
    // ========== PARTICULES ANIMÉES ==========
    function createParticles() {
        const container = document.getElementById('particles');
        for(let i=0; i<60; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 8 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.bottom = '-20px';
            particle.style.animationDuration = Math.random() * 10 + 8 + 's';
            particle.style.animationDelay = Math.random() * 15 + 's';
            container.appendChild(particle);
        }
    }
    createParticles();
    
    // ========== UPLOAD VIDEO UI ==========
    const uploadArea = document.getElementById('videoUploadArea');
    const videoInput = document.getElementById('videoFile');
    const fileNameSpan = document.getElementById('fileName');
    
    uploadArea.addEventListener('click', () => videoInput.click());
    uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.borderColor = '#e11d48'; });
    uploadArea.addEventListener('dragleave', () => uploadArea.style.borderColor = 'rgba(225,29,72,0.5)');
    uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if(file && file.type.startsWith('video/')) handleFile(file);
        uploadArea.style.borderColor = 'rgba(225,29,72,0.5)';
    });
    
    videoInput.addEventListener('change', (e) => {
        if(e.target.files[0]) handleFile(e.target.files[0]);
    });
    
    function handleFile(file) {
        if(file.size > 100 * 1024 * 1024) {
            showFormAlert('error', 'Vidéo trop volumineuse (max 100MB)');
            return;
        }
        selectedFile = file;
        fileNameSpan.textContent = file.name;
        fileNameSpan.style.color = '#e11d48';
    }
    
    function showFormAlert(type, message) {
        const alertDiv = document.getElementById('formAlert');
        alertDiv.textContent = message;
        alertDiv.className = `alert ${type}`;
        alertDiv.style.display = 'block';
        setTimeout(() => alertDiv.style.display = 'none', 5000);
    }
    
    // ========== INSCRIPTION ==========
    document.getElementById('inscriptionForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const nom = document.getElementById('nom').value.trim();
        const postnom = document.getElementById('postnom').value.trim();
        const prenom = document.getElementById('prenom').value.trim();
        const universite = document.getElementById('universite').value.trim();
        const promotion = document.getElementById('promotion').value.trim();
        const faculte = document.getElementById('faculte').value.trim();
        const telephone = document.getElementById('telephone').value.trim();
        const motivation = document.getElementById('motivation').value.trim();
        
        if(!nom || !prenom || !universite || !promotion || !faculte || !telephone || !motivation) {
            showFormAlert('error', 'Veuillez remplir tous les champs obligatoires');
            return;
        }
        
        if(!selectedFile) {
            showFormAlert('error', 'Veuillez télécharger votre vidéo d\'éloquence');
            return;
        }
        
        const submitBtn = document.querySelector('.submit-btn');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Inscription en cours...';
        
        try {
            // Upload vidéo vers Firebase Storage
            const videoExt = selectedFile.name.split('.').pop();
            const videoId = Date.now() + '_' + Math.random().toString(36).substring(2);
            const storageRef = storage.ref(`videos_candidats/${videoId}.${videoExt}`);
            await storageRef.put(selectedFile);
            const videoURL = await storageRef.getDownloadURL();
            
            // Créer document candidat
            const candidatData = {
                nom, postnom, prenom,
                nomComplet: `${prenom} ${nom} ${postnom}`.trim(),
                universite, promotion, faculte, telephone, motivation,
                videoURL,
                dateInscription: firebase.firestore.FieldValue.serverTimestamp(),
                statut: 'inscrit'
            };
            
            await db.collection('candidats_eloquence').add(candidatData);
            
            showFormAlert('success', '🎉 Inscription réussie ! Vous recevrez un email de confirmation.');
            document.getElementById('inscriptionForm').reset();
            selectedFile = null;
            fileNameSpan.textContent = '';
            videoInput.value = '';
            
        } catch(error) {
            console.error(error);
            showFormAlert('error', 'Erreur lors de l\'inscription. Réessayez.');
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-pen-fancy"></i> S\'INSCRIRE AU CONCOURS';
        }
    });
    
    // ========== ADMIN PANEL ==========
    const adminLockBtn = document.getElementById('adminLockBtn');
    const adminModal = document.getElementById('adminPasswordModal');
    const adminPanelDiv = document.getElementById('adminPanel');
    
    adminLockBtn.addEventListener('click', () => {
        adminModal.style.display = 'flex';
    });
    
    document.getElementById('closeAdminModal').addEventListener('click', () => {
        adminModal.style.display = 'none';
        document.getElementById('adminPassInput').value = '';
    });
    
    document.getElementById('submitAdminPass').addEventListener('click', () => {
        const pass = document.getElementById('adminPassInput').value;
        if(pass === ADMIN_PASSWORD) {
            adminModal.style.display = 'none';
            adminPanelDiv.style.display = 'block';
            chargerCandidatsAdmin();
        } else {
            const alertDiv = document.getElementById('adminPassAlert');
            alertDiv.textContent = 'Mot de passe incorrect';
            alertDiv.className = 'alert error';
            alertDiv.style.display = 'block';
            setTimeout(() => alertDiv.style.display = 'none', 2000);
        }
    });
    
    document.getElementById('closeAdminPanelBtn').addEventListener('click', () => {
        adminPanelDiv.style.display = 'none';
    });
    
    async function chargerCandidatsAdmin() {
        const container = document.getElementById('adminCandidatesContainer');
        container.innerHTML = '<div style="text-align:center; padding:50px;"><i class="fas fa-spinner fa-spin"></i> Chargement des candidats...</div>';
        
        try {
            const snapshot = await db.collection('candidats_eloquence').orderBy('dateInscription', 'desc').get();
            
            if(snapshot.empty) {
                container.innerHTML = '<div style="text-align:center; padding:50px;">Aucun candidat inscrit pour le moment.</div>';
                return;
            }
            
            let html = '';
            snapshot.forEach(doc => {
                const c = doc.data();
                html += `
                    <div class="candidate-admin-card">
                        <h3 style="color:#e11d48;">${c.nomComplet || c.prenom + ' ' + c.nom}</h3>
                        <p><i class="fas fa-university"></i> ${c.universite || '-'} | ${c.faculte || '-'}</p>
                        <p><i class="fas fa-calendar"></i> Promotion: ${c.promotion || '-'}</p>
                        <p><i class="fas fa-phone"></i> ${c.telephone || '-'}</p>
                        <div class="badge"><i class="fas fa-heart"></i> Motivation</div>
                        <p style="margin:10px 0; background:#1e293b; padding:12px; border-radius:20px;">${c.motivation || '-'}</p>
                        <div class="video-preview">
                            ${c.videoURL ? `<video controls src="${c.videoURL}" style="width:100%; border-radius:20px;"></video>` : '<p>Aucune vidéo</p>'}
                        </div>
                        <p style="font-size:0.7rem; color:#94a3b8;">Inscrit le: ${c.dateInscription ? new Date(c.dateInscription.seconds * 1000).toLocaleString() : 'N/A'}</p>
                    </div>
                `;
            });
            container.innerHTML = html;
        } catch(err) {
            console.error(err);
            container.innerHTML = '<div style="text-align:center; padding:50px; color:#ef4444;">Erreur de chargement des données.</div>';
        }
    }
    
    // Recharger automatiquement toutes les 15 secondes si panel ouvert
    setInterval(() => {
        if(adminPanelDiv.style.display === 'block') {
            chargerCandidatsAdmin();
        }
    }, 15000);
    
    // Animation supplémentaire : effets d'entrée
    document.querySelectorAll('.input-group input, .input-group textarea').forEach(el => {
        el.addEventListener('focus', () => {
            el.parentElement.style.transform = 'translateX(5px)';
        });
        el.addEventListener('blur', () => {
            el.parentElement.style.transform = 'translateX(0)';
        });
    });
</script>
</body>
</html>
