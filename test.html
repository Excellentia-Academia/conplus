        * {

            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0b0c1a 0%, #12162c 100%);
            font-family: 'Inter', sans-serif;
            color: #f0ede8;
            padding: 2rem 1.5rem;
            min-height: 100vh;
        }

        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.08) 0%, rgba(0,0,0,0) 60%);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* HEADER */
        .hero {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 1s ease-out;
        }

        .badge {
            display: inline-block;
            background: rgba(212, 175, 55, 0.2);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(212, 175, 55, 0.4);
            padding: 0.4rem 1.2rem;
            border-radius: 60px;
            font-size: 0.8rem;
            letter-spacing: 1px;
            font-weight: 500;
            color: #e9c468;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #FFFFFF 0%, #E9C468 80%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #b9b9d4;
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.5;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 2rem 0 1.5rem;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(20, 25, 55, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 0.8rem 1.8rem;
            border: 1px solid rgba(233, 196, 104, 0.3);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: #e9c468;
            font-family: 'Playfair Display', serif;
        }

        .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Filtres */
        .filter-wrapper {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: rgba(20, 25, 55, 0.6);
            border: 1px solid rgba(233, 196, 104, 0.3);
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            color: #e9c468;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .filter-btn.active {
            background: #e9c468;
            color: #0b0c1a;
            border-color: #e9c468;
        }

        .filter-btn:hover {
            background: rgba(233, 196, 104, 0.2);
            transform: translateY(-2px);
        }

        /* Barre de recherche */
        .search-wrapper {
            margin: 2rem auto 2rem;
            max-width: 550px;
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #e9c468;
            font-size: 1.2rem;
        }

        #searchInput {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            font-size: 1rem;
            background: rgba(12, 15, 35, 0.8);
            border: 1.5px solid rgba(233, 196, 104, 0.5);
            border-radius: 60px;
            color: white;
            font-family: 'Inter', sans-serif;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        #searchInput:focus {
            outline: none;
            border-color: #e9c468;
            box-shadow: 0 0 12px rgba(233, 196, 104, 0.4);
        }

        #searchInput::placeholder {
            color: #9aa0b5;
        }

        .reset-search {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #b9b9d4;
            cursor: pointer;
            font-size: 1rem;
        }

        .reset-search:hover {
            color: #e9c468;
        }

        /* Grille */
        .candidates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        /* Carte standard */
        .candidate-card {
            background: linear-gradient(145deg, rgba(25, 30, 55, 0.8) 0%, rgba(18, 22, 45, 0.9) 100%);
            backdrop-filter: blur(4px);
            border-radius: 1.8rem;
            padding: 1.2rem 1.5rem;
            border: 1px solid rgba(233, 196, 104, 0.2);
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.5s forwards;
            animation-delay: calc(var(--order, 0) * 0.01s);
            position: relative;
        }

        /* Carte sélectionnée (finaliste) */
        .candidate-card.selected {
            background: linear-gradient(145deg, rgba(45, 40, 70, 0.95) 0%, rgba(30, 28, 55, 0.98) 100%);
            border: 2px solid #e9c468;
            box-shadow: 0 0 20px rgba(233, 196, 104, 0.3);
        }

        .candidate-card.selected::before {
            content: "★";
            position: absolute;
            top: -10px;
            right: 15px;
            font-size: 1.5rem;
            color: #e9c468;
            background: #0b0c1a;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 1px solid #e9c468;
        }

        .candidate-card:hover {
            transform: translateY(-6px) scale(1.01);
            border-color: rgba(233, 196, 104, 0.6);
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.5);
        }

        .card-name {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: 0.5rem;
            color: #ffffff;
            padding-right: 25px;
        }

        .university {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: #b9c2e6;
            background: rgba(0,0,0,0.35);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            margin-top: 8px;
            width: fit-content;
        }

        .university i {
            font-size: 0.7rem;
            color: #e9c468;
        }

        .medal-icon {
            font-size: 0.8rem;
            margin-left: 6px;
            color: #e9c468;
        }

        .selected-badge {
            display: inline-block;
            background: #e9c468;
            color: #0b0c1a;
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            margin-left: 10px;
            font-weight: 600;
        }

        .no-result {
            text-align: center;
            padding: 3rem;
            background: rgba(0,0,0,0.3);
            border-radius: 2rem;
            margin-top: 2rem;
            font-size: 1.2rem;
            color: #d4c2a0;
        }

        .footer-note {
            text-align: center;
            margin-top: 4rem;
            font-size: 0.8rem;
            color: #6b7299;
            border-top: 1px solid rgba(233, 196, 104, 0.2);
            padding-top: 2rem;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 700px) {
            body {
                padding: 1.2rem;
            }
            h1 {
                font-size: 2rem;
            }
            .stats {
                gap: 0.8rem;
            }
            .candidates-grid {
                grid-template-columns: 1fr;
            }
            .filter-btn {
                padding: 0.4rem 1rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>

        { name: "DARLENE YOWA NGANDU", uni: "UNIVERSITÉ CATHOLIQUE DU CONGO", selected: false },
        { name: "David Kitengie Malangu", uni: "Université Protestante au Congo", selected: false },
        { name: "Espérance KIKADI NZUZI", uni: "Université de Kinshasa", selected: false },
        { name: "Adeline Luvta Grâce", uni: "Université de Kinshasa", selected: false },
        { name: "Daniel grâce Suwa Matshozi", uni: "HEC", selected: false },
        { name: "Emmanuel Konga Anyda", uni: "Université Protestante au Congo", selected: false },
        { name: "GUSTAVE NYAMANGOMBE OMANGONDO", uni: "UNIVERSITÉ DE KINSHASA", selected: false },
        { name: "Furah FURAH KIPATA", uni: "UPC", selected: false }
    ];

    let currentFilter = "all"; // 'all' ou 'selected'

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderCandidates() {
        const searchTerm = document.getElementById("searchInput").value.toLowerCase().trim();
        let filtered = [...allCandidates];
        
        // Appliquer le filtre (tous ou sélectionnés)
        if (currentFilter === "selected") {
            filtered = filtered.filter(c => c.selected === true);
        }
        
        // Appliquer la recherche
        if (searchTerm !== "") {
            filtered = filtered.filter(c => 
                c.name.toLowerCase().includes(searchTerm) || 
                c.uni.toLowerCase().includes(searchTerm)
            );
        }
        
        const grid = document.getElementById("candidatesGrid");
        document.getElementById("visibleCount").innerText = filtered.length;
        
        if (filtered.length === 0) {
            grid.innerHTML = `<div class="no-result"><i class="fas fa-feather-alt"></i> Aucun candidat ne correspond à votre recherche.<br>Essayez un autre nom, prénom ou université.</div>`;
            return;
        }
        
        let html = "";
        filtered.forEach((c, idx) => {
            const selectedClass = c.selected ? "selected" : "";
            const selectedBadgeHtml = c.selected ? '<span class="selected-badge"><i class="fas fa-star"></i> Finaliste</span>' : '';
            html += `
                <div class="candidate-card ${selectedClass}" style="--order: ${idx}">
                    <div class="card-name">
                        ${escapeHtml(c.name)}
                        ${selectedBadgeHtml}
                    </div>
                    <div class="university">
                        <i class="fas fa-university"></i> ${escapeHtml(c.uni)}
                    </div>
                </div>
            `;
        });
        grid.innerHTML = html;
    }
    
    // Écouteurs d'événements
    document.getElementById("searchInput").addEventListener("input", renderCandidates);
    document.getElementById("resetSearchBtn").addEventListener("click", () => {
        document.getElementById("searchInput").value = "";
        renderCandidates();
    });
    
    // Filtres
    document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentFilter = btn.dataset.filter;
            renderCandidates();
        });
    });
    
    // Rendu initial
    renderCandidates();
</script>
</body>
