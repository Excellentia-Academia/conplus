<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excellentia Academia | Inscription</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fc 0%, #e9ecef 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        :root {
            --blue: #0a2b5e;
            --red: #c41e3a;
            --gold: #d4af37;
            --gray: #64748b;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 1rem;
        }

        .logo img {
            height: 65px;
            width: 65px;
            border-radius: 16px;
            border: 3px solid var(--red);
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--blue);
        }

        .logo span {
            color: var(--red);
        }

        .header p {
            color: var(--gray);
            font-size: 1.1rem;
        }

        .form-card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        .form-header {
            background: linear-gradient(135deg, var(--blue), #1e3a6f);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .form-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .form-header p {
            opacity: 0.9;
        }

        .form-body {
            padding: 2.5rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--blue);
            font-size: 0.9rem;
        }

        .form-group label .required {
            color: var(--red);
        }

        input, select, textarea {
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: 0.2s;
            background: white;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--red);
            box-shadow: 0 0 0 3px rgba(196,30,58,0.1);
        }

        .btn-submit {
            background: var(--red);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            background: #9a162e;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(196,30,58,0.3);
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .message {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
            display: none;
        }

        .message.success {
            background: #dcfce7;
            color: #166534;
            display: block;
            border-left: 4px solid #22c55e;
        }

        .message.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
            border-left: 4px solid var(--red);
        }

        /* Champ Autre faculté (caché par défaut) */
        .other-faculty-field {
            display: none;
            margin-top: 0.5rem;
        }

        .other-faculty-field.show {
            display: block;
        }

        @media (max-width: 700px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            .form-body {
                padding: 1.5rem;
            }
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--gray);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">
            <img src="IMG_1812.jpeg" alt="Logo Excellentia Academia" onerror="this.src='https://via.placeholder.com/65?text=EA'">
            <h1>Excellentia <span>Academia</span></h1>
        </div>
        <p>Au-delà de l'excellence académique</p>
    </div>

    <div class="form-card">
        <div class="form-header">
            <h2><i class="fas fa-user-graduate"></i> Formulaire d'adhésion</h2>
            <p>Devenez membre ou ambassadeur de notre communauté d'excellence</p>
        </div>
        <div class="form-body">
            <form id="registrationForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Nom <span class="required">*</span></label>
                        <input type="text" id="lastName" required placeholder="Votre nom">
                    </div>
                    <div class="form-group">
                        <label>Prénom <span class="required">*</span></label>
                        <input type="text" id="firstName" required placeholder="Votre prénom">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Email <span class="required">*</span></label>
                        <input type="email" id="email" required placeholder="exemple@email.com">
                    </div>
                    <div class="form-group">
                        <label>Téléphone</label>
                        <input type="tel" id="phone" placeholder="+243 XXX XXX XXX">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Université <span class="required">*</span></label>
                        <input type="text" id="university" required placeholder="Université de Kinshasa">
                    </div>
                    <div class="form-group">
                        <label>Faculté <span class="required">*</span></label>
                        <select id="faculty" required>
                            <option value="">-- Sélectionnez votre faculté --</option>
                            <option>Droit</option>
                            <option>Lettres et Sciences Humaines</option>
                            <option>Sciences Économiques et de Gestion</option>
                            <option>Sciences Sociales, Administratives et Politiques</option>
                            <option>Sciences et Technologies</option>
                            <option>Médecine</option>
                            <option>Polytechnique</option>
                            <option>Psychologie et Sciences de l'Éducation</option>
                            <option>Sciences Pharmaceutiques</option>
                            <option>Médecine Vétérinaire</option>
                            <option>Pétrole, Gaz et Énergies Renouvelables</option>
                            <option>Sciences Agronomiques</option>
                            <option>Médecine Dentaire</option>
                            <option value="autre">📝 Autre (précisez ci-dessous)</option>
                        </select>
                        <div class="other-faculty-field" id="otherFacultyDiv">
                            <input type="text" id="otherFaculty" placeholder="Précisez le nom de votre faculté" style="margin-top: 8px;">
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Promotion / Niveau <span class="required">*</span></label>
                        <select id="promotion" required>
                            <option value="">-- Sélectionnez votre niveau --</option>
                            <option>Licence 1</option>
                            <option>Licence 2</option>
                            <option>Licence 3</option>
                            <option>Master 1</option>
                            <option>Master 2</option>
                            <option>Doctorat</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Type d'inscription <span class="required">*</span></label>
                        <select id="typeInscription" required>
                            <option value="">-- Choisissez --</option>
                            <option value="Membre">📘 Membre</option>
                            <option value="Ambassadeur">⭐ Ambassadeur</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Motivation <span class="required">*</span></label>
                    <textarea id="motivation" rows="5" required placeholder="Pourquoi souhaitez-vous rejoindre Excellentia Academia ? Quels sont vos objectifs, vos passions, votre engagement..."></textarea>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">
                    <i class="fas fa-paper-plane"></i> Envoyer ma candidature
                </button>
                <div id="formMessage" class="message"></div>
            </form>
        </div>
    </div>
    <footer>
        <p>© 2025 Excellentia Academia — L'excellence au service de la jeunesse congolaise</p>
    </footer>
</div>

<script>
    // ========== GESTION DU CHAMP "AUTRE" POUR FACULTÉ ==========
    const facultySelect = document.getElementById('faculty');
    const otherFacultyDiv = document.getElementById('otherFacultyDiv');
    const otherFacultyInput = document.getElementById('otherFaculty');

    facultySelect.addEventListener('change', function() {
        if (this.value === 'autre') {
            otherFacultyDiv.classList.add('show');
            otherFacultyInput.setAttribute('required', 'required');
        } else {
            otherFacultyDiv.classList.remove('show');
            otherFacultyInput.removeAttribute('required');
            otherFacultyInput.value = '';
        }
    });

    // ========== FIREBASE ==========
    const firebaseConfig = {
        apiKey: "AIzaSyB68tv_pxmOxblO_qnHoF1cSWAMXTjhung",
        authDomain: "membre-955c6.firebaseapp.com",
        projectId: "membre-955c6",
        storageBucket: "membre-955c6.firebasestorage.app",
        messagingSenderId: "397628408442",
        appId: "1:397628408442:web:c14bab03891ab5111931c3",
        measurementId: "G-2ZRYLN3NMK"
    };

    let db;
    try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        console.log("✅ Firebase initialisé");
    } catch (err) {
        console.error("❌ Firebase erreur:", err);
    }

    // ========== EMAILJS ==========
    emailjs.init("aPNNQ4mKPEi85io_Q");
    const EMAILJS_SERVICE_ID = "service_gqclxov";
    const EMAILJS_TEMPLATE_ID = "template_sgnn50l";

    // LIEN WHATSAPP GROUPE MEMBRE
    const WHATSAPP_GROUP_LINK = "https://chat.whatsapp.com/HfKRmuvqkhUI2tk6tKlwiV?mode=gi_t";

    // ========== FONCTION POUR GÉNÉRER LE MESSAGE EMAIL ==========
    function generateEmailMessage(data, typeInscription) {
        const fullName = `${data.prenom} ${data.nom}`;
        const facultéValue = data.faculte === 'autre' ? data.otherFaculty : data.faculte;
        
        if (typeInscription === "Membre") {
            return `
Bonjour ${fullName},

🎉 Félicitations ! Votre inscription en tant que MEMBRE d'Excellentia Academia a bien été enregistrée.

📋 Récapitulatif de votre candidature :
- Université : ${data.universite}
- Faculté : ${facultéValue}
- Promotion : ${data.promotion}

✅ Prochaine étape :
Rejoignez dès maintenant notre communauté WhatsApp officielle pour ne rien manquer de nos activités, formations et événements :

🔗 LIEN D'INVITATION : ${WHATSAPP_GROUP_LINK}

Au plaisir de vous compter parmi nous !

Cordialement,
L'équipe Excellentia Academia
📧 excellentiaacademia@gmail.com
🌍 Au-delà de l'excellence académique
            `;
        } 
        else { // Ambassadeur
            return `
Bonjour ${fullName},

🙏 Merci pour votre candidature au poste d'AMBASSADEUR d'Excellentia Academia.

📋 Récapitulatif de votre candidature :
- Université : ${data.universite}
- Faculté : ${facultéValue}
- Promotion : ${data.promotion}

📌 Votre motivation :
"${data.motivation.substring(0, 200)}..."

🔍 Étude de votre profil :
Notre équipe de coordination va étudier attentivement votre profil ainsi que votre lettre de motivation. Nous reviendrons vers vous dans les meilleurs délais pour vous informer de la suite du processus de sélection.

💡 Ce que nous recherchons chez un Ambassadeur :
- Engagement et leadership
- Capacité à mobiliser
- Représenter dignement la structure dans votre faculté

Nous vous remercions pour votre intérêt et votre engagement envers l'excellence académique.

Cordialement,
La Coordination d'Excellentia Academia
📧 excellentiaacademia@gmail.com
            `;
        }
    }

    // ========== ENVOI DU FORMULAIRE ==========
    const form = document.getElementById('registrationForm');
    const submitBtn = document.getElementById('submitBtn');
    const messageDiv = document.getElementById('formMessage');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Récupération des valeurs
        const lastName = document.getElementById('lastName').value.trim();
        const firstName = document.getElementById('firstName').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const university = document.getElementById('university').value.trim();
        const faculty = document.getElementById('faculty').value;
        const otherFaculty = document.getElementById('otherFaculty').value.trim();
        const promotion = document.getElementById('promotion').value;
        const typeInscription = document.getElementById('typeInscription').value;
        const motivation = document.getElementById('motivation').value.trim();

        // Validation faculté "autre"
        let finalFaculty = faculty;
        if (faculty === 'autre') {
            if (!otherFaculty) {
                messageDiv.className = "message error";
                messageDiv.innerHTML = "❌ Veuillez préciser le nom de votre faculté";
                return;
            }
            finalFaculty = otherFaculty;
        }

        // Validation générale
        if (!lastName || !firstName || !email || !university || !faculty || !promotion || !typeInscription || !motivation) {
            messageDiv.className = "message error";
            messageDiv.innerHTML = "❌ Veuillez remplir tous les champs obligatoires (*)";
            return;
        }

        if (!email.includes('@') || !email.includes('.')) {
            messageDiv.className = "message error";
            messageDiv.innerHTML = "❌ Veuillez entrer un email valide";
            return;
        }

        // Désactiver bouton
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Envoi en cours...';

        // Générer le message email personnalisé
        const emailMessage = generateEmailMessage({
            prenom: firstName,
            nom: lastName,
            universite: university,
            faculte: faculty,
            otherFaculty: otherFaculty,
            promotion: promotion,
            motivation: motivation
        }, typeInscription);

        const candidat = {
            nom: lastName,
            prenom: firstName,
            email: email,
            telephone: phone,
            universite: university,
            faculte: finalFaculty,
            promotion: promotion,
            typeInscription: typeInscription,
            motivation: motivation,
            statut: "En attente",
            date: new Date().toLocaleString('fr-FR'),
            timestamp: new Date()
        };

        try {
            // 1. Envoi à Firebase
            if (db) {
                await db.collection("inscriptions").add(candidat);
                console.log("✅ Firebase OK");
            } else {
                console.warn("Firebase non disponible");
            }
            
            // 2. Envoi d'email personnalisé
            const emailParams = {
                to_name: `${firstName} ${lastName}`,
                to_email: email,
                type_candidature: typeInscription,
                message: emailMessage
            };
            
            await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, emailParams);
            console.log("✅ EmailJS OK");

            // Message de succès différent selon le type
            let successMsg = "";
            if (typeInscription === "Membre") {
                successMsg = `✅ Félicitations ${firstName} ! Votre inscription a été enregistrée. Vérifiez vos emails (y compris les spams) pour rejoindre notre groupe WhatsApp.`;
            } else {
                successMsg = `✅ Merci ${firstName} pour votre candidature ! Un email de confirmation vous a été envoyé. Notre équipe étudiera votre profil et vous recontactera sous peu.`;
            }
            
            messageDiv.className = "message success";
            messageDiv.innerHTML = successMsg;
            
            // Réinitialiser le formulaire
            form.reset();
            otherFacultyDiv.classList.remove('show');
            otherFacultyInput.value = '';

        } catch (error) {
            console.error("ERREUR DÉTAILLÉE:", error);
            
            let errorMsg = "❌ Une erreur est survenue. ";
            
            if (error.code === "permission-denied") {
                errorMsg += "Firebase: Activez le mode test dans Firestore (Règles → allow read, write: if true)";
            } else if (error.text) {
                errorMsg += `EmailJS: ${error.text}`;
            } else if (error.message) {
                errorMsg += error.message;
            } else {
                errorMsg += "Vérifiez votre connexion internet et réessayez.";
            }
            
            messageDiv.className = "message error";
            messageDiv.innerHTML = errorMsg;
            
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Envoyer ma candidature';
        }
    });
</script>
</body>
</html>
