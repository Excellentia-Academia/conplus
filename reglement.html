<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Lecture - Connexion Gmail Requise</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            border: 3px solid #ff3333;
        }

        .header {
            background: linear-gradient(135deg, #ff3333 0%, #cc0000 100%);
            color: white;
            padding: 30px;
            text-align: center;
            border-bottom: 3px solid #1e3c72;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .login-section {
            padding: 30px;
            background: #f0f4f8;
            text-align: center;
        }

        .login-section h2 {
            color: #1e3c72;
            margin-bottom: 20px;
        }

        .gmail-input {
            width: 100%;
            max-width: 400px;
            padding: 15px;
            margin: 10px auto;
            border: 2px solid #1e3c72;
            border-radius: 8px;
            font-size: 1.1em;
            display: block;
        }

        .gmail-input:focus {
            outline: none;
            border-color: #ff3333;
            box-shadow: 0 0 0 3px rgba(255,51,51,0.2);
        }

        .start-btn {
            background: #ff3333;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            border-bottom: 4px solid #990000;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .start-btn:hover:not(:disabled) {
            background: #ff5555;
            transform: translateY(-2px);
        }

        .start-btn:disabled {
            background: #cccccc;
            border-bottom: 4px solid #999999;
            cursor: not-allowed;
        }

        .game-area {
            padding: 30px;
            background: #f0f4f8;
            display: none;
        }

        .user-info {
            background: #1e3c72;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .user-email {
            font-size: 1.1em;
            background: rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 25px;
        }

        .user-status {
            font-size: 1.1em;
            background: #ff3333;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: bold;
        }

        .quiz-box {
            background: white;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-left: 5px solid #ff3333;
            border-right: 5px solid #1e3c72;
        }

        .question-text {
            font-size: 1.4em;
            color: #1e3c72;
            margin-bottom: 25px;
            line-height: 1.6;
            font-weight: 500;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .option-btn {
            padding: 15px;
            background: #f8f9fa;
            border: 2px solid #1e3c72;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
        }

        .option-btn:hover:not(:disabled) {
            background: #ff3333;
            color: white;
            border-color: #ff3333;
            transform: translateX(5px);
        }

        .option-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .option-btn.correct {
            background: #28a745;
            color: white;
            border-color: #28a745;
        }

        .option-btn.incorrect {
            background: #dc3545;
            color: white;
            border-color: #dc3545;
        }

        .message-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1em;
            text-align: center;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            border: 2px solid #28a745;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #dc3545;
        }

        .blocked-message {
            background: #fff3cd;
            color: #856404;
            border: 2px solid #ffc107;
            padding: 30px;
            text-align: center;
            border-radius: 10px;
            font-size: 1.3em;
        }

        .blocked-message i {
            font-size: 3em;
            display: block;
            margin-bottom: 20px;
        }

        .reset-btn {
            width: 100%;
            padding: 15px;
            background: #1e3c72;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            border-bottom: 4px solid #0a1a2f;
        }

        .reset-btn:hover {
            background: #2a5298;
            transform: translateY(-2px);
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 1.8em; }
            .options { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>📚 QUIZ LECTURE 📚</h1>
            <p>Connexion Gmail requise - Une seule chance par personne !</p>
        </div>

        <!-- Section Connexion -->
        <div class="login-section" id="loginSection">
            <h2>🔐 Connexion avec Gmail</h2>
            <input type="email" class="gmail-input" id="gmailInput" placeholder="votre.email@gmail.com" required>
            <p style="color: #666; margin: 10px 0;">💡 Seulement les adresses @gmail.com sont acceptées</p>
            <button class="start-btn" id="startBtn">Commencer le Quiz</button>
            <div id="loginError" style="color: #ff3333; margin-top: 15px;"></div>
        </div>

        <!-- Zone de Jeu (cachée au début) -->
        <div class="game-area" id="gameArea">
            <div class="user-info">
                <div class="user-email" id="displayEmail"></div>
                <div class="user-status" id="userStatus">🎯 En jeu</div>
            </div>

            <div id="quizContent">
                <!-- Le quiz apparaîtra ici -->
            </div>

            <div id="blockedView" style="display: none;">
                <div class="blocked-message">
                    <i>⛔</i>
                    <h2>Accès Refusé</h2>
                    <p>Vous avez déjà participé au quiz !</p>
                    <p style="font-size: 0.9em; margin-top: 20px;">Une seule tentative par personne est autorisée.</p>
                </div>
            </div>

            <button class="reset-btn" id="resetBtn" style="display: none;">🔄 Nouvelle partie (Admin)</button>
        </div>
    </div>

    <script>
        class QuizGame {
            constructor() {
                this.players = this.loadPlayers(); // Stocke les emails des joueurs
                this.currentPlayer = null;
                this.hasAnswered = false;
                
                // Questions du quiz sur la lecture
                this.questions = [
                    {
                        question: "Quel est le pluriel de 'cheval' ?",
                        options: ["chevaux", "chevals", "chevale", "cheval"],
                        correct: 0
                    },
                    {
                        question: "Que signifie le mot 'bibliothèque' ?",
                        options: [
                            "Un endroit où on vend des livres",
                            "Un endroit où on emprunte des livres",
                            "Une librairie",
                            "Un magazine"
                        ],
                        correct: 1
                    },
                    {
                        question: "Quelle est la première lettre de l'alphabet ?",
                        options: ["B", "A", "C", "D"],
                        correct: 1
                    },
                    {
                        question: "Combien y a-t-il de voyelles dans 'MAISON' ?",
                        options: ["2", "3", "4", "5"],
                        correct: 1 // A,I,O = 3 voyelles
                    },
                    {
                        question: "Quel est le synonyme de 'content' ?",
                        options: ["triste", "joyeux", "fatigué", "fâché"],
                        correct: 1
                    },
                    {
                        question: "Comment s'appelle une personne qui écrit des livres ?",
                        options: ["un lecteur", "un éditeur", "un auteur", "un libraire"],
                        correct: 2
                    },
                    {
                        question: "Que veut dire le mot 'lire' ?",
                        options: [
                            "Déchiffrer des mots",
                            "Écrire une lettre",
                            "Dessiner une image",
                            "Chanter une chanson"
                        ],
                        correct: 0
                    }
                ];

                this.currentQuestionIndex = 0;
                this.init();
            }

            loadPlayers() {
                // Charge les joueurs depuis le localStorage
                const saved = localStorage.getItem('quizPlayers');
                return saved ? JSON.parse(saved) : {};
            }

            savePlayers() {
                localStorage.setItem('quizPlayers', JSON.stringify(this.players));
            }

            init() {
                document.getElementById('startBtn').addEventListener('click', () => this.login());
                document.getElementById('resetBtn').addEventListener('click', () => this.resetGame());
                
                // Vérifier si l'utilisateur est déjà connecté
                const lastEmail = sessionStorage.getItem('currentPlayer');
                if (lastEmail && this.players[lastEmail] && !this.players[lastEmail].answered) {
                    this.currentPlayer = lastEmail;
                    this.showGame();
                }
            }

            login() {
                const email = document.getElementById('gmailInput').value.trim().toLowerCase();
                const errorDiv = document.getElementById('loginError');

                // Validation Gmail
                if (!email) {
                    errorDiv.textContent = "❌ Veuillez entrer votre email";
                    return;
                }

                if (!email.endsWith('@gmail.com')) {
                    errorDiv.textContent = "❌ Seules les adresses @gmail.com sont acceptées";
                    return;
                }

                // Vérifier si le joueur a déjà joué
                if (this.players[email] && this.players[email].answered) {
                    errorDiv.textContent = "❌ Cet email a déjà participé au quiz !";
                    return;
                }

                // Nouveau joueur
                this.currentPlayer = email;
                this.players[email] = {
                    email: email,
                    answered: false,
                    score: 0,
                    timestamp: new Date().toISOString()
                };
                
                this.savePlayers();
                sessionStorage.setItem('currentPlayer', email);
                
                this.showGame();
            }

            showGame() {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('gameArea').style.display = 'block';
                document.getElementById('displayEmail').textContent = `📧 ${this.currentPlayer}`;

                // Vérifier si le joueur a déjà répondu
                if (this.players[this.currentPlayer].answered) {
                    this.showBlockedView();
                } else {
                    this.startQuiz();
                }
            }

            showBlockedView() {
                document.getElementById('quizContent').style.display = 'none';
                document.getElementById('blockedView').style.display = 'block';
                document.getElementById('userStatus').textContent = '⛔ Bloqué';
                document.getElementById('userStatus').style.background = '#dc3545';
            }

            startQuiz() {
                document.getElementById('quizContent').style.display = 'block';
                document.getElementById('blockedView').style.display = 'none';
                this.currentQuestionIndex = 0;
                this.displayQuestion();
            }

            displayQuestion() {
                if (this.currentQuestionIndex >= this.questions.length) {
                    this.showFinalReward();
                    return;
                }

                const question = this.questions[this.currentQuestionIndex];
                let html = `
                    <div class="quiz-box">
                        <div class="question-text">
                            Question ${this.currentQuestionIndex + 1}/${this.questions.length} :<br>
                            ${question.question}
                        </div>
                        <div class="options" id="optionsContainer">
                `;

                question.options.forEach((option, index) => {
                    html += `
                        <button class="option-btn" data-index="${index}">
                            ${option}
                        </button>
                    `;
                });

                html += `
                        </div>
                        <div id="messageArea" class="message-area"></div>
                    </div>
                `;

                document.getElementById('quizContent').innerHTML = html;

                // Ajouter les événements aux boutons
                document.querySelectorAll('.option-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => this.checkAnswer(e));
                });
            }

            checkAnswer(event) {
                if (this.hasAnswered) return;

                const selectedBtn = event.target;
                const selectedIndex = parseInt(selectedBtn.dataset.index);
                const currentQuestion = this.questions[this.currentQuestionIndex];
                const isCorrect = (selectedIndex === currentQuestion.correct);

                // Marquer comme répondu
                this.hasAnswered = true;

                // Désactiver tous les boutons
                document.querySelectorAll('.option-btn').forEach(btn => {
                    btn.disabled = true;
                });

                // Colorier les réponses
                document.querySelectorAll('.option-btn').forEach((btn, index) => {
                    if (index === currentQuestion.correct) {
                        btn.classList.add('correct');
                    } else if (index === selectedIndex && !isCorrect) {
                        btn.classList.add('incorrect');
                    }
                });

                // Afficher le message
                const messageArea = document.getElementById('messageArea');
                
                if (isCorrect) {
                    this.players[this.currentPlayer].score++;
                    
                    messageArea.innerHTML = `
                        <div class="success-message">
                            ✅ Bonne réponse !<br>
                            Score: ${this.players[this.currentPlayer].score}/${this.questions.length}
                        </div>
                    `;

                    // Passer à la question suivante après 1.5 secondes
                    setTimeout(() => {
                        this.currentQuestionIndex++;
                        this.hasAnswered = false;
                        
                        if (this.currentQuestionIndex < this.questions.length) {
                            this.displayQuestion();
                        } else {
                            this.showFinalReward();
                        }
                    }, 1500);
                } else {
                    // Mauvaise réponse - FIN DU JEU !
                    messageArea.innerHTML = `
                        <div class="error-message">
                            ❌ Mauvaise réponse !<br>
                            La bonne réponse était : "${currentQuestion.options[currentQuestion.correct]}"<br>
                            <strong>Quiz terminé !</strong>
                        </div>
                    `;

                    // Marquer comme ayant répondu (même si c'est faux)
                    this.players[this.currentPlayer].answered = true;
                    this.players[this.currentPlayer].completed = true;
                    this.savePlayers();
                    
                    document.getElementById('userStatus').textContent = '⛔ Quiz terminé';
                }

                this.savePlayers();
            }

            showFinalReward() {
                // Marquer comme ayant répondu
                this.players[this.currentPlayer].answered = true;
                this.players[this.currentPlayer].completed = true;
                this.savePlayers();

                const score = this.players[this.currentPlayer].score;
                const total = this.questions.length;
                
                let message = '';
                let code = '';

                if (score === total) {
                    code = 'LECTURE-PRO-2024';
                    message = '🎉 FÉLICITATIONS ! 🎉';
                } else if (score >= total - 2) {
                    code = 'BON-LECTEUR';
                    message = '📚 BRAVO ! 📚';
                } else {
                    code = 'MERCI-PARTICIPATION';
                    message = '📖 MERCI ! 📖';
                }

                document.getElementById('quizContent').innerHTML = `
                    <div style="text-align: center; padding: 40px; background: white; border-radius: 10px;">
                        <h2 style="color: #1e3c72; margin-bottom: 20px;">${message}</h2>
                        <p style="font-size: 1.3em; margin-bottom: 20px;">
                            Score: ${score}/${total}
                        </p>
                        <div style="background: linear-gradient(135deg, #ff3333, #1e3c72); 
                                    color: white; 
                                    padding: 30px; 
                                    border-radius: 10px;
                                    margin: 20px 0;">
                            <div style="font-size: 0.9em; margin-bottom: 10px;">🎁 VOTRE CODE DE RÉCOMPENSE :</div>
                            <div style="font-size: 2em; font-weight: bold; letter-spacing: 3px;">
                                ${code}
                            </div>
                        </div>
                        <p style="color: #666; font-size: 0.9em;">
                            ⚠️ Ce code ne peut être utilisé qu'une seule fois
                        </p>
                    </div>
                `;

                document.getElementById('userStatus').textContent = '✅ Terminé';
                document.getElementById('userStatus').style.background = '#28a745';
            }

            resetGame() {
                // Réinitialisation (réservée à l'admin)
                localStorage.removeItem('quizPlayers');
                sessionStorage.removeItem('currentPlayer');
                location.reload();
            }
        }

        // Lancer le jeu
        document.addEventListener('DOMContentLoaded', () => {
            new QuizGame();
        });
    </script>
</body>
</html>
