<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devinettes Rouges & Bleues</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            border: 3px solid #ff3333;
        }

        .header {
            background: linear-gradient(135deg, #ff3333 0%, #cc0000 100%);
            color: white;
            padding: 30px;
            text-align: center;
            border-bottom: 3px solid #1e3c72;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.95;
        }

        .game-area {
            padding: 30px;
            background: #f0f4f8;
        }

        .status-bar {
            background: #1e3c72;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .timer {
            font-size: 1.3em;
            font-weight: bold;
            background: #ff3333;
            padding: 8px 20px;
            border-radius: 25px;
            box-shadow: 0 4px 0 #990000;
        }

        .reward-status {
            font-size: 1.1em;
            background: rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 25px;
        }

        .reward-display {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.3em;
            border: 2px solid #ff3333;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-all;
        }

        .riddle-box {
            background: white;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-left: 5px solid #ff3333;
            border-right: 5px solid #1e3c72;
        }

        .riddle-text {
            font-size: 1.3em;
            color: #1e3c72;
            margin-bottom: 20px;
            line-height: 1.6;
            font-weight: 500;
        }

        .riddle-image {
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border: 2px dashed #ff3333;
        }

        .riddle-image svg {
            max-width: 100%;
            height: auto;
        }

        .answer-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .answer-input {
            flex: 1;
            padding: 15px;
            border: 2px solid #1e3c72;
            border-radius: 8px;
            font-size: 1.1em;
            transition: all 0.3s;
        }

        .answer-input:focus {
            outline: none;
            border-color: #ff3333;
            box-shadow: 0 0 0 3px rgba(255,51,51,0.2);
        }

        .submit-btn {
            padding: 15px 30px;
            background: #ff3333;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 4px solid #990000;
        }

        .submit-btn:hover:not(:disabled) {
            background: #ff5555;
            transform: translateY(-2px);
        }

        .submit-btn:disabled {
            background: #cccccc;
            border-bottom: 4px solid #999999;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .players-list {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .players-list h3 {
            color: #1e3c72;
            margin-bottom: 15px;
            font-size: 1.3em;
            border-bottom: 2px solid #ff3333;
            padding-bottom: 5px;
        }

        .player-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin-bottom: 8px;
            background: #f8f9fa;
            border-radius: 5px;
            border-left: 4px solid #1e3c72;
        }

        .player-name {
            font-weight: 600;
            color: #1e3c72;
        }

        .player-status {
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .status-waiting {
            background: #ffd700;
            color: #856404;
        }

        .status-answered {
            background: #28a745;
            color: white;
        }

        .status-blocked {
            background: #dc3545;
            color: white;
        }

        .winner-message {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #ffd700, #ffb347);
            border-radius: 10px;
            margin-top: 20px;
            font-size: 1.4em;
            font-weight: bold;
            color: #1e3c72;
            border: 3px solid #ff3333;
        }

        .reset-btn {
            width: 100%;
            padding: 15px;
            background: #1e3c72;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            border-bottom: 4px solid #0a1a2f;
        }

        .reset-btn:hover {
            background: #2a5298;
            transform: translateY(-2px);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .reward-active {
            animation: pulse 1s infinite;
            background: linear-gradient(135deg, #28a745, #20c997);
        }

        .hidden {
            display: none;
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 1.8em; }
            .answer-section { flex-direction: column; }
            .status-bar { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🔴 DEVINETTES ROUGE & BLEU ⚫</h1>
            <p>Une seule réponse possible - Un seul code à gagner !</p>
        </div>

        <div class="game-area">
            <div class="status-bar">
                <div class="timer" id="timer">⏱️ 30s</div>
                <div class="reward-status" id="rewardStatus">🎁 Code disponible</div>
            </div>

            <div class="reward-display" id="rewardDisplay">
                🎯 En attente d'une réponse...
            </div>

            <div class="riddle-box">
                <div class="riddle-text" id="riddleText">
                    Chargement de la devinette...
                </div>
                
                <div class="riddle-image" id="riddleImage">
                    <!-- Image générée dynamiquement -->
                </div>

                <div class="answer-section">
                    <input type="text" class="answer-input" id="answerInput" placeholder="Votre réponse..." autocomplete="off">
                    <button class="submit-btn" id="submitBtn">Valider</button>
                </div>
            </div>

            <div class="players-list">
                <h3>👥 Candidats en jeu</h3>
                <div id="playersContainer">
                    <!-- Liste des joueurs générée dynamiquement -->
                </div>
            </div>

            <div id="winnerMessage" class="winner-message hidden"></div>
            
            <button class="reset-btn" id="resetBtn">🔄 Nouvelle partie</button>
        </div>
    </div>

    <script>
        class Game {
            constructor() {
                this.currentReward = this.generateReward();
                this.rewardClaimed = false;
                this.claimedBy = null;
                this.players = new Map();
                this.currentRiddleIndex = 0;
                this.timerInterval = null;
                this.timeLeft = 30;
                
                // Devinettes impossibles pour l'IA
                this.riddles = [
                    {
                        text: "J'ai dessiné une forme abstraite. À ton avis, ça ressemble à quoi ?",
                        image: this.createShape1,
                        answers: ["nuage", "montagne", "vague", "fleur", "arbre", "soleil", "lune", "étoile", "cœur", "poisson"],
                        code: "R2D2-C3PO"
                    },
                    {
                        text: "Regarde ce gribouillage. Quel objet du quotidien cela te fait-il penser ?",
                        image: this.createShape2,
                        answers: ["tasse", "chaise", "table", "lampe", "livre", "stylo", "téléphone", "ordinateur", "bouteille", "fourchette"],
                        code: "SKYWALKER"
                    },
                    {
                        text: "Cette forme bizarre... ça te rappelle quel animal ?",
                        image: this.createShape3,
                        answers: ["chat", "chien", "lapin", "souris", "oiseau", "poisson", "cheval", "vache", "lion", "éléphant"],
                        code: "YODA2024"
                    },
                    {
                        text: "Et ça, c'est quoi selon toi ? (pas de mauvaise réponse !)",
                        image: this.createShape4,
                        answers: ["maison", "voiture", "bateau", "avion", "train", "vélo", "moto", "fusée", "château", "pont"],
                        code: "BB8-FORCE"
                    },
                    {
                        text: "Dernière forme ! Ton imagination est la clé...",
                        image: this.createShape5,
                        answers: ["pizza", "gateau", "fruit", "legume", "pain", "fromage", "chocolat", "glace", "bonbon", "sandwich"],
                        code: "JEDI-FIN"
                    }
                ];

                this.init();
            }

            generateReward() {
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
                let reward = '';
                for (let i = 0; i < 12; i++) {
                    if (i > 0 && i % 4 === 0) reward += '-';
                    reward += chars[Math.floor(Math.random() * chars.length)];
                }
                return reward;
            }

            createShape1() {
                const colors = ['#ff3333', '#1e3c72', '#ff9999', '#4a6fa5'];
                const color = colors[Math.floor(Math.random() * colors.length)];
                return `
                    <svg width="200" height="150" viewBox="0 0 200 150">
                        <circle cx="70" cy="60" r="40" fill="${color}" opacity="0.7"/>
                        <circle cx="130" cy="80" r="35" fill="${colors[1]}" opacity="0.7"/>
                        <circle cx="100" cy="40" r="25" fill="${colors[2]}" opacity="0.7"/>
                        <path d="M20 120 Q100 140 180 110" stroke="${colors[0]}" stroke-width="4" fill="none"/>
                        <circle cx="50" cy="30" r="8" fill="white"/>
                        <circle cx="150" cy="50" r="8" fill="white"/>
                    </svg>
                `;
            }

            createShape2() {
                return `
                    <svg width="200" height="150" viewBox="0 0 200 150">
                        <rect x="50" y="30" width="100" height="80" fill="#1e3c72" rx="10"/>
                        <circle cx="100" cy="70" r="25" fill="#ff3333"/>
                        <line x1="30" y1="110" x2="170" y2="90" stroke="#ff3333" stroke-width="4"/>
                        <rect x="80" y="10" width="40" height="20" fill="#ff9999" rx="5"/>
                        <circle cx="60" cy="100" r="10" fill="white"/>
                        <circle cx="140" cy="100" r="10" fill="white"/>
                    </svg>
                `;
            }

            createShape3() {
                return `
                    <svg width="200" height="150" viewBox="0 0 200 150">
                        <ellipse cx="100" cy="80" rx="60" ry="40" fill="#1e3c72"/>
                        <circle cx="70" cy="60" r="15" fill="#ff3333"/>
                        <circle cx="130" cy="60" r="15" fill="#ff3333"/>
                        <ellipse cx="100" cy="100" rx="30" ry="15" fill="white"/>
                        <path d="M40 20 L70 40 L130 40 L160 20" stroke="#ff3333" stroke-width="4" fill="none"/>
                        <circle cx="85" cy="55" r="5" fill="white"/>
                        <circle cx="115" cy="55" r="5" fill="white"/>
                    </svg>
                `;
            }

            createShape4() {
                return `
                    <svg width="200" height="150" viewBox="0 0 200 150">
                        <polygon points="100,20 180,60 180,120 20,120 20,60" fill="#1e3c72" opacity="0.8"/>
                        <rect x="70" y="70" width="60" height="50" fill="#ff3333"/>
                        <circle cx="100" cy="95" r="15" fill="white" opacity="0.5"/>
                        <line x1="100" y1="20" x2="100" y2="50" stroke="#ff3333" stroke-width="4"/>
                        <circle cx="140" cy="100" r="8" fill="white"/>
                        <circle cx="60" cy="100" r="8" fill="white"/>
                    </svg>
                `;
            }

            createShape5() {
                return `
                    <svg width="200" height="150" viewBox="0 0 200 150">
                        <circle cx="100" cy="75" r="50" fill="#ff3333" opacity="0.7"/>
                        <circle cx="80" cy="60" r="10" fill="#1e3c72"/>
                        <circle cx="120" cy="60" r="10" fill="#1e3c72"/>
                        <path d="M70 95 Q100 115 130 95" stroke="#1e3c72" stroke-width="5" fill="none"/>
                        <circle cx="140" cy="40" r="15" fill="#ff9999"/>
                        <circle cx="50" cy="110" r="20" fill="#4a6fa5" opacity="0.6"/>
                        <circle cx="160" cy="100" r="12" fill="white" opacity="0.8"/>
                    </svg>
                `;
            }

            init() {
                this.updateRiddle();
                this.startTimer();
                this.updateUI();
                
                // Simuler des joueurs (à remplacer par votre système)
                this.addPlayer("Joueur 1");
                this.addPlayer("Joueur 2");
                this.addPlayer("Joueur 3");
                
                document.getElementById('submitBtn').addEventListener('click', () => this.checkAnswer());
                document.getElementById('resetBtn').addEventListener('click', () => this.resetGame());
                document.getElementById('answerInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.checkAnswer();
                });
            }

            addPlayer(name) {
                this.players.set(name, {
                    name: name,
                    hasAnswered: false,
                    isBlocked: false
                });
                this.updatePlayersList();
            }

            updatePlayersList() {
                const container = document.getElementById('playersContainer');
                container.innerHTML = '';
                
                this.players.forEach((player, name) => {
                    const playerDiv = document.createElement('div');
                    playerDiv.className = 'player-item';
                    
                    let statusClass = 'status-waiting';
                    let statusText = 'En attente';
                    
                    if (player.isBlocked) {
                        statusClass = 'status-blocked';
                        statusText = 'Bloqué';
                    } else if (player.hasAnswered) {
                        statusClass = 'status-answered';
                        statusText = 'A répondu';
                    }
                    
                    playerDiv.innerHTML = `
                        <span class="player-name">${name}</span>
                        <span class="player-status ${statusClass}">${statusText}</span>
                    `;
                    
                    container.appendChild(playerDiv);
                });
            }

            blockPlayer(playerName) {
                const player = this.players.get(playerName);
                if (player) {
                    player.isBlocked = true;
                    this.updatePlayersList();
                }
            }

            updateRiddle() {
                const riddle = this.riddles[this.currentRiddleIndex];
                document.getElementById('riddleText').textContent = riddle.text;
                document.getElementById('riddleImage').innerHTML = riddle.image();
            }

            checkAnswer() {
                if (this.rewardClaimed) {
                    alert('❌ Le code a déjà été gagné !');
                    return;
                }

                const answer = document.getElementById('answerInput').value.trim().toLowerCase();
                if (!answer) return;

                // Simuler un joueur (dans un vrai jeu, identifiez le joueur)
                const currentPlayer = "Joueur 1";
                
                // Vérifier si le joueur est bloqué
                const player = this.players.get(currentPlayer);
                if (player && player.isBlocked) {
                    alert('⛔ Vous avez déjà joué et n\'avez pas trouvé !');
                    return;
                }

                const riddle = this.riddles[this.currentRiddleIndex];
                const isCorrect = riddle.answers.some(a => a.toLowerCase() === answer);

                if (isCorrect) {
                    // Récompense gagnée !
                    this.rewardClaimed = true;
                    this.claimedBy = currentPlayer;
                    
                    // Marquer le joueur comme ayant répondu
                    if (player) {
                        player.hasAnswered = true;
                    }
                    
                    // Bloquer tous les autres joueurs
                    this.players.forEach((p, name) => {
                        if (name !== currentPlayer) {
                            p.isBlocked = true;
                        }
                    });
                    
                    // Afficher la récompense
                    const reward = this.riddles[this.currentRiddleIndex].code;
                    document.getElementById('rewardDisplay').innerHTML = `
                        🏆 CODE GAGNÉ ! 🏆<br>
                        <span style="font-size: 1.5em; letter-spacing: 2px;">${reward}</span><br>
                        <small>Gagné par ${currentPlayer}</small>
                    `;
                    
                    document.getElementById('rewardDisplay').classList.add('reward-active');
                    document.getElementById('rewardStatus').innerHTML = '🎁 Code gagné !';
                    document.getElementById('submitBtn').disabled = true;
                    
                    // Afficher message de victoire
                    const winnerMsg = document.getElementById('winnerMessage');
                    winnerMsg.classList.remove('hidden');
                    winnerMsg.innerHTML = `👑 Félicitations ${currentPlayer} ! Tu as gagné le code !`;
                    
                    clearInterval(this.timerInterval);
                    
                } else {
                    // Mauvaise réponse - bloquer le joueur
                    if (player) {
                        player.isBlocked = true;
                        this.updatePlayersList();
                    }
                    
                    alert(`❌ Mauvaise réponse ! ${currentPlayer} est maintenant bloqué pour cette devinette.`);
                    
                    // Vérifier si tous les joueurs sont bloqués
                    const allBlocked = Array.from(this.players.values()).every(p => p.isBlocked);
                    if (allBlocked && !this.rewardClaimed) {
                        setTimeout(() => {
                            if (!this.rewardClaimed) {
                                this.nextRiddle();
                            }
                        }, 1500);
                    }
                }
                
                document.getElementById('answerInput').value = '';
            }

            nextRiddle() {
                if (this.rewardClaimed) return;
                
                this.currentRiddleIndex = (this.currentRiddleIndex + 1) % this.riddles.length;
                
                // Réinitialiser les statuts des joueurs pour la nouvelle devinette
                this.players.forEach(player => {
                    player.hasAnswered = false;
                    player.isBlocked = false;
                });
                
                this.updateRiddle();
                this.updatePlayersList();
                
                // Nouveau timer
                clearInterval(this.timerInterval);
                this.timeLeft = 30;
                this.startTimer();
            }

            startTimer() {
                this.timerInterval = setInterval(() => {
                    if (this.rewardClaimed) {
                        clearInterval(this.timerInterval);
                        return;
                    }
                    
                    this.timeLeft--;
                    document.getElementById('timer').innerHTML = `⏱️ ${this.timeLeft}s`;
                    
                    if (this.timeLeft <= 0) {
                        clearInterval(this.timerInterval);
                        if (!this.rewardClaimed) {
                            alert("⏰ Temps écoulé ! Nouvelle devinette...");
                            this.nextRiddle();
                        }
                    }
                }, 1000);
            }

            resetGame() {
                this.currentReward = this.generateReward();
                this.rewardClaimed = false;
                this.claimedBy = null;
                this.currentRiddleIndex = 0;
                this.timeLeft = 30;
                
                // Réinitialiser les joueurs
                this.players.forEach(player => {
                    player.hasAnswered = false;
                    player.isBlocked = false;
                });
                
                document.getElementById('rewardDisplay').innerHTML = '🎯 En attente d\'une réponse...';
                document.getElementById('rewardDisplay').classList.remove('reward-active');
                document.getElementById('rewardStatus').innerHTML = '🎁 Code disponible';
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('winnerMessage').classList.add('hidden');
                document.getElementById('answerInput').value = '';
                
                this.updateRiddle();
                this.updatePlayersList();
                
                clearInterval(this.timerInterval);
                this.startTimer();
            }

            updateUI() {
                this.updatePlayersList();
            }
        }

        // Lancer le jeu au chargement
        document.addEventListener('DOMContentLoaded', () => {
            new Game();
        });
    </script>
</body>
</html>
