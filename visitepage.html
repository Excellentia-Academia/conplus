<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🏆 Éloquence en scène /title>
    
    <!-- Font Awesome (icônes) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    
    <!-- Google Fonts (Poppins) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />

    <style>
        /* ============================================================
                   CSS COMPLET
                   ============================================================ */

        /* ---- VARIABLES ---- */
        :root {
            --gold: #d4af37;
            --gold-light: #f5e6a3;
            --gold-dark: #a07c1e;
            --gold-glow: rgba(212, 175, 55, 0.25);
            --black: #0a0a0a;
            --dark-grey: #141414;
            --card-bg: rgba(20, 18, 14, 0.92);
            --white: #f0ede6;
            --shadow: 0 15px 40px rgba(0, 0, 0, 0.8);
            --radius: 16px;
            --transition: 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
        }

        /* ---- RESET ---- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            padding: 20px;
            background-image: 
                radial-gradient(ellipse at 10% 20%, #1f1a0a 0%, #050505 70%),
                radial-gradient(ellipse at 90% 80%, #1a1508 0%, transparent 60%);
            background-attachment: fixed;
        }

        /* ---- SCROLLBAR ---- */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gold-dark);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--gold);
        }

        /* ============================================================
                   HEADER
                   ============================================================ */
        header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding: 14px 32px;
            background: rgba(12, 11, 8, 0.85);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 80px;
            margin-bottom: 28px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            position: sticky;
            top: 12px;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.7rem;
            font-weight: 900;
            color: var(--gold);
            letter-spacing: 0.5px;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.15);
        }

        .logo i {
            font-size: 2rem;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.25));
        }

        .logo span {
            background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 300;
            color: var(--gold-light);
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: rgba(212, 175, 55, 0.06);
            padding: 6px 20px;
            border-radius: 40px;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }

        .header-badge i {
            font-size: 0.7rem;
            color: var(--gold);
        }

        .search-bar {
            position: relative;
        }

        .search-bar input {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(212, 175, 55, 0.15);
            padding: 10px 24px 10px 44px;
            border-radius: 60px;
            color: var(--white);
            font-size: 0.92rem;
            width: 270px;
            transition: var(--transition);
            backdrop-filter: blur(4px);
            font-family: 'Poppins', sans-serif;
        }

        .search-bar input::placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-weight: 300;
            font-size: 0.85rem;
        }

        .search-bar input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.08);
            background: rgba(255, 255, 255, 0.07);
            width: 320px;
        }

        .search-bar .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.9rem;
            pointer-events: none;
        }

        /* ---- BOUTON RÉINITIALISER ---- */
        .reset-btn {
            background: rgba(212, 175, 55, 0.08);
            border: 1px solid rgba(212, 175, 55, 0.15);
            color: var(--gold-light);
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.75rem;
            font-family: 'Poppins', sans-serif;
            transition: var(--transition);
            margin-left: 8px;
            display: none;
            align-items: center;
            gap: 6px;
        }

        .reset-btn:hover {
            background: rgba(212, 175, 55, 0.18);
            border-color: var(--gold);
        }

        .reset-btn.visible {
            display: inline-flex;
        }

        /* ============================================================
                   HERO
                   ============================================================ */
        .hero {
            text-align: center;
            padding: 20px 15px 30px;
            margin-bottom: 10px;
            position: relative;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            opacity: 0.3;
        }

        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f5e6a3 0%, #d4af37 40%, #b8962a 70%, #a07c1e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            text-shadow: 0 0 80px rgba(212, 175, 55, 0.08);
            line-height: 1.2;
        }

        .hero p {
            font-size: 1.1rem;
            color: #999;
            font-weight: 300;
            margin-top: 6px;
            letter-spacing: 3px;
        }

        .hero .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .hero .stats span {
            font-size: 0.8rem;
            color: #666;
            background: rgba(255, 255, 255, 0.03);
            padding: 4px 18px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            letter-spacing: 1px;
        }

        .hero .stats span i {
            color: var(--gold);
            margin-right: 6px;
        }

        /* ============================================================
                   GRILLE DES MATCHS
                   ============================================================ */
        #matchGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 28px;
            max-width: 1450px;
            margin: 10px auto 0;
            padding: 10px 0 20px;
        }

        /* ---- CARTE MATCH ---- */
        .match-card {
            background: var(--card-bg);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: var(--radius);
            padding: 24px 22px 20px;
            border-left: 5px solid var(--gold);
            box-shadow: var(--shadow);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            cursor: default;
            border: 1px solid rgba(212, 175, 55, 0.06);
            border-left-width: 5px;
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
        }

        .match-card:hover {
            transform: translateY(-8px) scale(1.015);
            border-color: var(--gold);
            box-shadow: 0 25px 60px rgba(212, 175, 55, 0.08), 0 0 40px rgba(212, 175, 55, 0.02);
            background: rgba(28, 25, 16, 0.96);
        }

        .match-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.04) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .match-card::after {
            content: '';
            position: absolute;
            bottom: -40%;
            left: -20%;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.02) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .match-number {
            font-size: 0.7rem;
            color: var(--gold-dark);
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 6px;
            opacity: 0.5;
            font-family: 'Poppins', sans-serif;
        }

        .match-number i {
            margin-right: 5px;
            font-size: 0.6rem;
        }

        .match-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--gold-light);
            line-height: 1.5;
            margin-bottom: 14px;
            padding: 6px 0 10px 0;
            border-bottom: 1px dashed rgba(212, 175, 55, 0.08);
            min-height: 60px;
            display: flex;
            align-items: center;
        }

        .match-title .icon {
            margin-right: 10px;
            font-size: 1.1rem;
            color: var(--gold);
            opacity: 0.4;
        }

        /* ---- DUEL ---- */
        .duel {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .duel .candidate {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.92rem;
            padding: 6px 10px;
            border-radius: 10px;
            transition: var(--transition);
        }

        .duel .candidate:hover {
            background: rgba(212, 175, 55, 0.04);
        }

        .duel .role {
            font-weight: 700;
            font-size: 0.65rem;
            letter-spacing: 1.5px;
            padding: 3px 14px;
            border-radius: 30px;
            min-width: 80px;
            text-align: center;
            text-transform: uppercase;
            font-family: 'Poppins', sans-serif;
        }

        .role.these {
            background: rgba(212, 175, 55, 0.15);
            color: var(--gold);
            border: 1px solid rgba(212, 175, 55, 0.12);
        }

        .role.antithese {
            background: rgba(70, 130, 255, 0.12);
            color: #7aa9ff;
            border: 1px solid rgba(70, 130, 255, 0.08);
        }

        .duel .name {
            font-weight: 500;
            color: #e8e4dc;
            letter-spacing: 0.3px;
        }

        .duel .vs-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 2px 0 2px 20px;
            color: #444;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 3px;
        }

        .duel .vs-divider .line {
            flex: 1;
            max-width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #444, transparent);
        }

        /* ---- BADGE CANDIDAT INCONNU ---- */
        .candidate-inconnu .name {
            color: #666;
            font-style: italic;
        }

        .candidate-inconnu .role {
            background: rgba(100, 100, 100, 0.15);
            color: #777;
            border-color: rgba(100, 100, 100, 0.1);
        }

        /* ============================================================
                   MESSAGE AUCUN RÉSULTAT
                   ============================================================ */
        .no-result {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: #555;
        }

        .no-result i {
            font-size: 3rem;
            color: #333;
            margin-bottom: 16px;
            display: block;
        }

        .no-result p {
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* ============================================================
                   ANIMATIONS
                   ============================================================ */
        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(35px) scale(0.97);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ============================================================
                   FOOTER
                   ============================================================ */
        footer {
            margin-top: 50px;
            text-align: center;
            padding: 30px 10px 15px;
            border-top: 1px solid rgba(212, 175, 55, 0.05);
            color: #3a3a3a;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        footer .footer-gold {
            color: var(--gold-dark);
            font-weight: 400;
        }

        footer .small {
            font-size: 0.65rem;
            color: #222;
            margin-top: 5px;
            letter-spacing: 0.5px;
        }

        footer .social-links {
            margin-top: 12px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        footer .social-links a {
            color: #333;
            font-size: 1.1rem;
            transition: var(--transition);
        }

        footer .social-links a:hover {
            color: var(--gold);
        }

        /* ============================================================
                   RESPONSIVE
                   ============================================================ */

        /* ---- Tablettes et petits écrans ---- */
        @media (max-width: 1024px) {
            #matchGrid {
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
                gap: 22px;
            }
        }

        @media (max-width: 820px) {
            header {
                flex-direction: column;
                gap: 14px;
                border-radius: 40px;
                padding: 18px 22px;
                top: 8px;
            }

            .logo {
                font-size: 1.5rem;
            }

            .header-badge {
                font-size: 0.7rem;
                padding: 4px 14px;
            }

            .search-bar input {
                width: 100%;
                max-width: 400px;
            }

            .search-bar input:focus {
                width: 100%;
                max-width: 400px;
            }

            .reset-btn {
                margin-left: 0;
                margin-top: 6px;
            }

            .hero h1 {
                font-size: 2.2rem;
            }

            .hero p {
                font-size: 0.95rem;
                letter-spacing: 1.5px;
            }

            #matchGrid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .match-card {
                padding: 18px 16px 16px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            header {
                padding: 14px 16px;
                border-radius: 30px;
                gap: 10px;
            }

            .logo {
                font-size: 1.2rem;
            }
            .logo i {
                font-size: 1.4rem;
            }

            .header-badge {
                font-size: 0.6rem;
                padding: 3px 12px;
                letter-spacing: 1px;
            }

            .search-bar input {
                font-size: 0.8rem;
                padding: 8px 16px 8px 36px;
            }
            .search-bar .search-icon {
                left: 14px;
                font-size: 0.75rem;
            }

            .hero h1 {
                font-size: 1.6rem;
            }
            .hero p {
                font-size: 0.8rem;
            }
            .hero .stats span {
                font-size: 0.65rem;
                padding: 2px 12px;
            }

            .match-title {
                font-size: 0.85rem;
                min-height: 45px;
            }
            .duel .candidate {
                font-size: 0.8rem;
                padding: 4px 6px;
                flex-wrap: wrap;
            }
            .duel .role {
                font-size: 0.55rem;
                min-width: 60px;
                padding: 2px 10px;
            }
            .duel .vs-divider {
                font-size: 0.55rem;
                margin-left: 0;
                justify-content: flex-start;
            }

            .match-card {
                padding: 14px 12px 14px;
                border-left-width: 4px;
            }

            footer {
                font-size: 0.7rem;
            }
        }

        @media (max-width: 360px) {
            .hero h1 {
                font-size: 1.3rem;
            }
            .match-title {
                font-size: 0.75rem;
            }
            .duel .candidate {
                font-size: 0.7rem;
                gap: 5px;
            }
            .duel .role {
                font-size: 0.5rem;
                min-width: 50px;
                padding: 1px 8px;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================================
    HEADER
    ============================================================ -->
    <header>
        <div class="logo">
            <i class="fas fa-microphone-alt"></i>
            <span>Éloquence en Scène </span>
        </div>
        <div class="header-badge">
            <i class="fas fa-map-pin"></i> Kinshasa · 26 débats
        </div>
        <div class="search-bar">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" placeholder="Candidat, thème, mot-clé..." autocomplete="off" />
            <button class="reset-btn" id="resetBtn">
                <i class="fas fa-times"></i> Effacer
            </button>
        </div>
    </header>

    <!-- ============================================================
    HERO
    ============================================================ -->
    <section class="hero">
        <h1>⚡ Affrontements Thèse / Antithèse</h1>
        <p>13 thèmes de société · 52 voix pour Kinshasa</p>
        <div class="stats">
            <span><i class="fas fa-users"></i> 52 candidats</span>
            <span><i class="fas fa-gavel"></i> 13 duels</span>
            <span><i class="fas fa-calendar-alt"></i> 2026</span>
        </div>
    </section>

    <!-- ============================================================
    GRILLE DES MATCHS
    ============================================================ -->
    <main id="matchGrid">
        <!-- Rempli par JavaScript -->
    </main>

    <!-- ============================================================
    FOOTER
    ============================================================ -->
    <footer>
        <p>© 2026 — <span class="footer-gold">Tournoi d'Éloquence de Kinshasa</span></p>
        <p class="small">Conçu pour la présentation des candidats · Tous droits réservés</p>
        <div class="social-links">
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
        </div>
    </footer>

    <!-- ============================================================
    JAVASCRIPT COMPLET
    ============================================================ -->

        // ================================================================
        // DONNÉES : 26 matchs (thèse / antithèse)
        // ================================================================
        const matchs = [
            // 1
            {
                id: 1,

                these: { nom: "Bernadine Mandanda Mbangu", role: "Thèse" },
                antithese: { nom: "Adju Abdallah Djuma", role: "Antithèse" }
            },
            // 2
            {
                id: 2,
                theme: "La réussite à Kinshasa se mesure-t-elle au volume de ce que l'on affiche sur les réseaux ?",

                antithese: { nom: "Arsène Sangwa Binanga", role: "Antithèse" }
            },
            // 3
            {
                id: 3,

            // 4
            {

            // 10

            },
            // 11
            {
                id: 11,
                theme: "Facebook et TikTok à Kinshasa : Outils d'émancipation intellectuelle ou de destruction morale ?",
                these: { nom: "Beni Musiteki", role: "Thèse" },
                antithese: { nom: "Divine Nlandu Nsakanunu", role: "Antithèse" }
            },
            // 12
            {
                id: 12,
                theme: "Les funérailles à Kinshasa (Matanga) : Devoir de mémoire ou théâtralisation de la misère ?",
                these: { nom: "Thomas Kashavu Muhigirwa", role: "Thèse" },
                antithese: { nom: "Divine Mugoli Kashemwa", role: "Antithèse" }
            },
            // 13
            {
                id: 13,
                theme: "L'argent dans les relations amoureuses : Preuve d'amour ou prostitution déguisée ?",

            },
            // 14
            {
                id: 14,
                theme: "Les accusations de sorcellerie sur les enfants : Fait spirituel ou démission parentale ?",

                antithese: { nom: "Jenovic Sumaili Letashi", role: "Antithèse" }
            },
            // 15

        // ================================================================
        // RÉFÉRENCES DOM
        // ================================================================
        const grid = document.getElementById('matchGrid');
        const searchInput = document.getElementById('searchInput');
        const resetBtn = document.getElementById('resetBtn');

        // ================================================================
        // FONCTION : RENDRE LES CARTES
        // ================================================================
        function renderMatchs(data) {
            grid.innerHTML = '';

            if (data.length === 0) {
                grid.innerHTML = `
                            <div class="no-result">
                                <i class="fas fa-search"></i>
                                <p>Aucun candidat ou thème trouvé</p>
                            </div>
                        `;
                return;
            }

            data.forEach((m, index) => {
                const card = document.createElement('div');
                card.className = 'match-card';
                card.style.animationDelay = `${index * 0.04}s`;

                // Vérifier si le candidat est "Inconnu"
                const isAntitheseInconnu = m.antithese.nom === 'Inconnu';
                const antitheseClass = isAntitheseInconnu ? 'candidate-inconnu' : '';

                card.innerHTML = `
                            <div class="match-number">
                                <i class="fas fa-trophy"></i> Match #${m.id}
                            </div>
                            <div class="match-title">
                                <span class="icon">⚡</span> ${m.theme}
                            </div>
                            <div class="duel">
                                <div class="candidate">
                                    <span class="role these">${m.these.role}</span>
                                    <span class="name">${m.these.nom}</span>
                                </div>
                                <div class="vs-divider">
                                    <span class="line"></span>
                                    ⚔️ VS
                                    <span class="line"></span>
                                </div>
                                <div class="candidate ${antitheseClass}">
                                    <span class="role antithese">${m.antithese.role}</span>
                                    <span class="name">${m.antithese.nom}</span>
                                    ${isAntitheseInconnu ? '<span style="font-size:0.65rem;color:#555;margin-left:6px;">(à déterminer)</span>' : ''}
                                </div>
                            </div>
                        `;
                grid.appendChild(card);
            });
        }

        // ================================================================
        // FONCTION : FILTRER
        // ================================================================
        function filterMatchs(query) {
            const q = query.toLowerCase().trim();

            if (q === '') {
                resetBtn.classList.remove('visible');
                renderMatchs(matchs);
                return;
            }

            resetBtn.classList.add('visible');

            const filtered = matchs.filter(m => {
                const searchable = [
                    m.theme,
                    m.these.nom,
                    m.antithese.nom,
                    m.these.role,
                    m.antithese.role
                ].join(' ').toLowerCase();

                return searchable.includes(q);
            });

            renderMatchs(filtered);
        }

        // ================================================================
        // FONCTION : RÉINITIALISER
        // ================================================================
        function resetSearch() {
            searchInput.value = '';
            resetBtn.classList.remove('visible');
            renderMatchs(matchs);
            searchInput.focus();
        }

        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        searchInput.addEventListener('input', (e) => {
            filterMatchs(e.target.value);
        });

        resetBtn.addEventListener('click', resetSearch);

        // Appuyer sur Échap pour réinitialiser
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                resetSearch();
                e.preventDefault();
            }
        });

        // ================================================================
        // INIT : CHARGEMENT
        // ================================================================
        renderMatchs(matchs);

        // ================================================================
        // COMPTAGE DES CANDIDATS POUR LA CONSOLE (débogage)
        // ================================================================
        console.log(`✅ ${matchs.length} matchs chargés`);
        console.log(`👥 ${matchs.length * 2} candidats (thèse + antithèse)`);
        console.log(`🎯 ${new Set(matchs.map(m => m.theme)).size} thèmes uniques`);
    </script>
