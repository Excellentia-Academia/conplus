<!-- Bouton d'export Excel simplifié -->
<button id="exportExcelSimpleBtn" style="position: fixed; bottom: 110px; right: 30px; width: 65px; height: 65px; background: linear-gradient(135deg, #10b981, #059669); border-radius: 50%; border: none; cursor: pointer; z-index: 1000; box-shadow: 0 0 20px rgba(16,185,129,0.4);">
    <i class="fas fa-file-excel" style="font-size: 1.8rem; color: white;"></i>
</button>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
document.getElementById('exportExcelSimpleBtn').addEventListener('click', async () => {
    try {
        // Récupérer tous les candidats depuis Firestore
        const snapshot = await db.collection('candidats').get();
        
        if (snapshot.empty) {
            alert('Aucun candidat inscrit pour le moment.');
            return;
        }
        
        // Construire les données pour Excel (uniquement nom, prénom, université)
        const donneesExcel = [];
        
        snapshot.forEach(doc => {
            const data = doc.data();
            donneesExcel.push({
                'NOM': data.nom || '',
                'PRÉNOM': data.prenom || '',
                'UNIVERSITÉ': data.universite || ''
            });
        });
        
        // Créer une feuille de calcul
        const feuille = XLSX.utils.json_to_sheet(donneesExcel);
        
        // Ajuster la largeur des colonnes
        feuille['!cols'] = [
            { wch: 25 },  // NOM
            { wch: 25 },  // PRÉNOM
            { wch: 40 }   // UNIVERSITÉ
        ];
        
        // Créer le classeur
        const classeur = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(classeur, feuille, 'Candidats');
        
        // Générer le fichier et le télécharger
        const date = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
        XLSX.writeFile(classeur, `candidats_noms_universites_${date}.xlsx`);
        
        // Message de confirmation
        showFlashMessage(`✅ Export Excel : ${donneesExcel.length} candidats`, false);
        
    } catch (error) {
        console.error('Erreur export Excel:', error);
        showFlashMessage('❌ Erreur lors de l\'export', true);
    }
});
</script>
